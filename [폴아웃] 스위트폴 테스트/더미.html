\n<script>\n(function() {\n    console.log("🚀 Resolver Loaded for: " + window.location.pathname);\n    const backupLinkMap = {};\n    function handleLink(e) {\n        const a = e.target.closest('a');\n        if (!a || !a.href || a.href.indexOf('arca.live') === -1) return;\n        const parts = a.href.split('/');\n        const lastPart = parts[parts.length - 1].split('?')[0].split('#')[0];\n        const articleId = lastPart.replace(/[^0-9]/g, '');\n        if (articleId && backupLinkMap[articleId]) {\n            e.preventDefault(); e.stopImmediatePropagation();\n            const repoName = "Tullius-ferry";\n            const path = window.location.pathname;\n            const repoBase = path.substring(0, path.toLowerCase().indexOf(repoName.toLowerCase()) + repoName.length);\n            const targetPath = backupLinkMap[articleId].replace(/\\/g, '/');\n            const finalUrl = window.location.origin + repoBase + "/" + encodeURI(targetPath);\n            console.log('✅ Redirecting:', finalUrl);\n            window.location.href = finalUrl; return false;\n        }\n    }\n    document.addEventListener('click', handleLink, true);\n    document.addEventListener('mousedown', handleLink, true);\n})();\n</script>
