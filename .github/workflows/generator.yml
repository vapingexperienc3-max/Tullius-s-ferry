- name: Generate nested index.html
        run: |
          python <<'EOF'
          import os

          def inject_width_style(filepath):
              style_code = """<style>body, .fr-view, #content, .main-container, .article-content { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 10px !important; } img { max-width: 100% !important; height: auto !important; }</style>"""
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  for nick in ["Ryl3", "ryl3", "RYL3"]: content = content.replace(nick, "")
                  if '<head>' in content: content = content.replace('<head>', '<head>' + style_code)
                  with open(filepath, 'w', encoding='utf-8') as f: f.write(content)
              except: pass

          def generate_contents(startpath):
              sidebar_html = ""
              main_html = ""
              folder_data = []
              for root, dirs, files in sorted(os.walk(startpath)):
                  dirs[:] = [d for d in dirs if not d.startswith('.')]
                  html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
                  if html_files:
                      rel_path = os.path.relpath(root, startpath)
                      display_name = "MAIN ARCHIVE" if rel_path == "." else rel_path.upper()
                      folder_id = "f-" + rel_path.replace(os.sep, '-')
                      folder_data.append((display_name, folder_id, root, html_files))

              sidebar_html += "<div class='sidebar-nav'><h3>📜 NAVIGATION</h3>"
              for name, fid, _, _ in folder_data:
                  sidebar_html += f"<a href='javascript:void(0)' onclick='showCategory(\"{fid}\")' class='sidebar-link' id='link-{fid}'>- {name}</a>"
              sidebar_html += "</div>"

              for name, fid, root, html_files in folder_data:
                  main_html += f"<div id='{fid}' class='category-content' style='display:none;'>"
                  main_html += f"<h2 style='color:#ffce54; border-bottom:1px solid rgba(255,206,84,0.3); padding-bottom:10px;'>{name}</h2>"
                  main_html += "<ul style='list-style:square; padding-left:25px;'>"
                  for f in sorted(html_files):
                      full_path = os.path.join(root, f)
                      inject_width_style(full_path)
                      rel_file_path = os.path.relpath(full_path, startpath).replace(os.sep, '/')
                      display_f = f.replace('.html', '').split(' (')[0].replace(' - 툴리우스 채널', '')
                      main_html += f"<li style='margin:12px 0;'><a href='{rel_file_path}' target='_blank' style='color:#ffce54; text-decoration:none;'>{display_f}</a></li>"
                  main_html += "</ul></div>"
              return sidebar_html, main_html

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius's Ferry&Vault 404-Vault boy's Outpost</title><style>")
              f.write("body { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://static.kinguin.net/media/catalog/category/cache/1/hi_image/9df78eab33525d08d6e5fb8d27136e95/The-Elder-Scrolls-V-Skyrim.jpg'); background-size: cover; background-attachment: fixed; background-color: #000; color: #eee; font-family: sans-serif; margin: 0; display: flex; justify-content: center; }")
              f.write(".wrapper { display: flex; width: 100%; max-width: 1200px; padding: 40px; gap: 40px; z-index: 1; }")
              f.write(".sidebar-nav { width: 250px; position: sticky; top: 40px; height: fit-content; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,206,84,0.3); border-radius: 8px; padding: 20px; backdrop-filter: blur(10px); }")
              f.write(".sidebar-link { display: block; color: #ccc; text-decoration: none; padding: 8px 0; transition: 0.3s; font-size: 0.9em; }")
              f.write(".sidebar-link:hover, .sidebar-link.active { color: #ffce54; text-shadow: 0 0 8px #ffce54; padding-left: 5px; }")
              f.write(".main-area { flex: 1; min-width: 0; background: rgba(0,0,0,0.5); padding: 30px; border-radius: 8px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); }")
              f.write("a:hover { text-decoration: underline; }</style></head><body>")
              
              sidebar, main = generate_contents('.')
              f.write("<div id='particles-js' style='position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;'></div>")
              f.write(f"<div class='wrapper'>{sidebar}<div class='main-area'>")
              
              # [1] 원본 제목 그대로 복구
              f.write("<div style='border-bottom: 2px solid rgba(88, 96, 105, 0.5); margin-bottom: 20px; padding-bottom: 10px; display: flex; align-items: baseline; flex-wrap: wrap; gap: 12px;'>")
              f.write("<span style='font-size: 2.2em; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); letter-spacing: -1px;'>TULLIUS'S FERRY</span>")
              f.write("<span style='font-size: 1.7em; font-weight: 200; color: #ffce54; letter-spacing: 0.5px; opacity: 0.9;'>& <strong style='font-weight: 600;'>Vault 404</strong> - Vault boy's Outpost ☢️</span>")
              f.write("</div>")
              
              # [2] 원본 이스란 명언 그대로 복구
              f.write("<p style='color: #bdc3c7;'>'언젠가 이런 날이 올 줄 알았지. 난 알았어. 하지만 아무도 믿지 않았지.'</p>")

              # [3] 가이드 및 후기 (백업본 텍스트 100% 복사)
              f.write("<div style='background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 206, 84, 0.3); border-radius: 8px; padding: 20px; margin-bottom: 30px; backdrop-filter: blur(10px); text-align: left;'>")
              f.write("<h3 style='color: #ffce54; margin-top: 0; margin-bottom: 15px; font-size: 1.1em; border: none;'>[🚣 Tullius's Ferry & ☢️ Vault 404-Vault boy's Outpost 가이드 및 후기]</h3>")
              f.write("<div style='font-size: 0.9em; color: #ccc; line-height: 1.8;'>")
              f.write("<p style='margin-bottom: 15px;'><strong>💡 이용 팁:</strong><br>- 대부분의 파일은 HTML 양식으로 백업되어 있습니다. <strong>(기술적 한계로 영상은 출력되지 않습니다.)</strong><br>- <strong>질문,피드백,로그</strong>의 경우 일일히 버전이나 문제 유형을 구분하기 어려워 <strong>폴더 하나에 구분없이 넣었습니다.</strong>양해 바랍니다.<br>- <strong>미해결 탭</strong>의 경우 해결되지 않았다고 생각되는 이슈들을 백업해 놓았습니다 <strong>들어가 있는 글들 중에 해결된 문제가 있으면 피드백 부탁드립니다.</strong><br>- 자잘한 픽스나 번역은 원본 대신 HTML 링크로 백업되었으며, <strong>외부 링크(구드/메가)가 터지는 경우는 대처가 어렵습니다.</strong><br>- <strong>모드팩, 프리셋, 의상, 동료</strong> 등 주요 자료는 테라박스에 원본으로 백업되어 있습니다. <span style='color: #ffce54; font-weight: bold;'>(파일 암호 필수 확인)</span></p>")
              f.write("<span style='color: #ffce54; font-weight: bold;'>* 테라박스 링크가 깨졌을 경우 툴챈이나 코네에 피드백 부탁드립니다.</span></p>")
              f.write("<p style='border-top: 1px solid rgba(255,206,84,0.15); padding-top: 15px; margin-top: 15px;'><strong>✍️ 후기:</strong><br>공장장 이 개같은 년, 너 아니었음 이거 시작도 안 했어 알아? 알면 소븐가드에서 우릴 위해 술잔이나 들어달라고. <br>툴붕이들은 아프지 말고. 너네 없어지면 15년 동안 후속작 유기하는 토드 새끼 누가 욕해주냐?</p></div></div>")

              f.write(main)
              f.write("</div></div>")
              f.write("<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script>")
              f.write("<script>function showCategory(id){document.querySelectorAll('.category-content').forEach(el=>el.style.display='none');document.querySelectorAll('.sidebar-link').forEach(el=>el.classList.remove('active'));document.getElementById(id).style.display='block';document.getElementById('link-'+id).classList.add('active');}")
              f.write("window.onload=()=>{particlesJS('particles-js',{'particles':{'number':{'value':150},'color':{'value':'#fff'},'shape':{'type':'circle'},'opacity':{'value':0.5},'size':{'value':3},'line_linked':{'enable':false},'move':{'enable':true,'speed':1.5,'direction':'bottom','out_mode':'out'}}});")
              f.write("const firstCat=document.querySelector('.category-content');if(firstCat)showCategory(firstCat.id);};</script></body></html>")
          EOF
