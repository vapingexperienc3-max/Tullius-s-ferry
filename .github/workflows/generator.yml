name: Generate Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate nested index.html
        run: |
          python <<EOF
          import os

          # [원본] 스타일 주입 로직 (RYL3 닉네임 제거 포함)
          def inject_width_style(filepath):
              style_code = """
              <style>
                body, .fr-view, #content, .main-container, .article-content, div[class*="content"] { 
                  max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 10px !important; 
                }
                img { max-width: 100% !important; height: auto !important; }
                .navbar-wrapper .user-info, .navbar-wrapper .nav-item.member { display: none !important; }
              </style>
              """
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  for nick in ["Ryl3", "ryl3", "RYL3"]:
                      content = content.replace(nick, "")
                  if 'max-width: 100% !important' not in content:
                      if '<head>' in content:
                          content = content.replace('<head>', '<head>' + style_code)
                      else:
                          content = style_code + content
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(content)
              except:
                  pass

          def generate_html_list(startpath):
              html_content = ""
              sidebar_content = "<div class='sidebar-nav'>"
              sidebar_content += "<h3 style='color: #ffce54; font-size: 0.9em; margin-bottom: 15px; border-bottom: 1px solid rgba(255,206,84,0.3); padding-bottom: 5px; letter-spacing: 1px;'>📜 NAVIGATION</h3>"
              
              folder_data = []
              for root, dirs, files in sorted(os.walk(startpath)):
                  dirs[:] = [d for d in dirs if not d.startswith('.')]
                  html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
                  if html_files:
                      rel_path = os.path.relpath(root, startpath)
                      display_name = "MAIN ARCHIVE" if rel_path == "." else rel_path.upper()
                      folder_id = "folder-" + rel_path.replace(os.sep, '-')
                      folder_data.append((display_name, folder_id, root, html_files))

              # 사이드바 링크 생성
              for name, fid, _, _ in folder_data:
                  sidebar_content += f"<a href='#{fid}' class='sidebar-link'>- {name}</a>"
              sidebar_content += "</div>"

              # 메인 리스트 생성
              for name, fid, root, html_files in folder_data:
                  icon_url = "https://img.icons8.com/ios-filled/50/ffffff/skyrim.png"
                  html_content += f"<details id='{fid}' style='margin-bottom: 15px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 4px; overflow: hidden;'>"
                  html_content += f"<summary style='padding: 15px; font-weight: bold; cursor: pointer; list-style: none; color: #fff; letter-spacing: 1.5px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255, 255, 255, 0.05);'>"
                  html_content += f"<span><img src='{icon_url}' style='width:18px; margin-right:10px; opacity:0.9; vertical-align:text-bottom;'>{name}</span>"
                  html_content += f"<span style='font-size: 0.8em; color: #888; font-family: monospace;'>[{len(html_files)} FILES]</span>"
                  html_content += "</summary>"
                  html_content += "<ul style='margin: 0; padding: 15px 40px; list-style-type: square;'>"
                  for f in sorted(html_files):
                      full_path = os.path.join(root, f)
                      inject_width_style(full_path)
                      rel_file_path = os.path.relpath(full_path, startpath).replace(os.sep, '/')
                      display_f = f.replace('.html', '')
                      if ' (' in display_f: display_f = display_f.rsplit(' (', 1)[0]
                      if ' - 툴리우스 채널' in display_f: display_f = display_f.replace(' - 툴리우스 채널', '')
                      html_content += f'<li style="margin: 10px 0;"><a href="{rel_file_path}" target="_blank" style="color: #ffce54; text-decoration: none; font-weight: 500; font-size: 0.95em;">{display_f}</a></li>'
                  html_content += "</ul></details>"
              return sidebar_content, html_content

          with open('index.html', 'w', encoding='utf-8') as f:
              # [원본 CSS] 백업본과 100% 동일하게 작성 (레이아웃용 wrapper만 추가)
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'>")
              f.write("<meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Tullius's Ferry&Vault 404</title><style>")
              f.write("* { cursor: url('https://img.icons8.com/ios-filled/25/ffffff/sent.png'), auto !important; }")
              f.write("body { background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,1) 95%), linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://static.kinguin.net/media/catalog/category/cache/1/hi_image/9df78eab33525d08d6e5fb8d27136e95/The-Elder-Scrolls-V-Skyrim.jpg'); background-size: 100% auto; background-repeat: no-repeat; background-position: top center; background-attachment: fixed; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; line-height: 1.6; margin: 0; color: #eee; display: flex; justify-content: center; }")
              
              # 사이드바 전용 스타일 (원본 감성 유지)
              f.write(".wrapper { display: flex; width: 100%; max-width: 1200px; padding: 30px; gap: 30px; }")
              f.write(".sidebar-nav { width: 220px; position: sticky; top: 30px; height: fit-content; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,206,84,0.3); border-radius: 8px; padding: 20px; backdrop-filter: blur(10px); display: none; }")
              f.write("@media (min-width: 1024px) { .sidebar-nav { display: block; } }")
              f.write(".sidebar-link { display: block; color: #ccc; text-decoration: none; font-size: 0.85em; margin-bottom: 12px; transition: 0.3s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px; }")
              f.write(".sidebar-link:hover { color: #ffce54; padding-left: 5px; text-shadow: 0 0 8px #ffce54; }")
              
              f.write(".main-content { flex: 1; min-width: 0; }")
              f.write(".nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; }")
              f.write(".nav-btn { padding: 8px 18px; border: 1px solid rgba(255,206,84,0.4); border-radius: 4px; color: #ffce54; text-decoration: none; font-size: 0.85em; font-weight: bold; background: rgba(0,0,0,0.5); transition: 0.3s; }")
              f.write(".nav-btn.active { background: rgba(255,206,84,0.15); border-color: #ffce54; }")
              f.write("#search-bar { width: 100%; padding: 12px 20px; margin: 20px 0; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; color: #fff; outline: none; box-sizing: border-box; backdrop-filter: blur(5px); }")
              f.write("summary::-webkit-details-marker { display: none; } a:hover { color: #fff !important; text-decoration: underline; text-shadow: 0 0 8px #ffce54; }</style></head><body>")
              
              f.write("<div id='particles-js' style='position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;'></div>")
              
              sidebar, main_list = generate_html_list('.')
              
              f.write("<div class='wrapper'>")
              f.write(sidebar) # 왼쪽 사이드바
              f.write("<div class='main-content'>") # 오른쪽 메인 영역
              
              f.write("<div style='border-bottom: 2px solid rgba(88, 96, 105, 0.5); margin-bottom: 20px; padding-bottom: 10px; display: flex; align-items: baseline; flex-wrap: wrap; gap: 12px;'>")
              f.write("<span style='font-size: 2.2em; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); letter-spacing: -1px;'>TULLIUS'S FERRY</span>")
              f.write("<span style='font-size: 1.7em; font-weight: 200; color: #ffce54; opacity: 0.9;'>& <strong style='font-weight: 600;'>Vault 404</strong></span>")
              f.write("</div>")
              
              f.write("<div class='nav-tabs'><a href='#' class='nav-btn active'>🚣 Ferry (Skyrim)</a><a href='#' class='nav-btn'>☢️ Vault 404 (Fallout)</a></div>")
              f.write("<p style='color: #bdc3c7;'>'언젠가 이런 날이 올 줄 알았지. 난 알았어. 하지만 아무도 믿지 않았지.'</p>")
              f.write("<input type='text' id='search-bar' placeholder='보관소 내 파일 검색...' onkeyup='filterList()'>")

              # [원본] 가이드 박스 그대로 삽입
              f.write("<div style='background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 206, 84, 0.3); border-radius: 8px; padding: 20px; margin-bottom: 30px; backdrop-filter: blur(10px); text-align: left;'>")
              f.write("<h3 style='color: #ffce54; margin-top: 0; margin-bottom: 15px; font-size: 1.1em;'>[🚣 가이드 및 후기]</h3>")
              f.write("<div style='font-size: 0.9em; color: #ccc; line-height: 1.8;'><p>공장장 이 개같은 년... 툴붕이들은 아프지 말고.</p></div></div>")

              f.write(main_list) # 파일 리스트
              f.write("</div></div>") # 닫기

              f.write("<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script>")
              f.write("<script>particlesJS('particles-js', {'particles':{'number':{'value':150,'density':{'enable':true,'value_area':800}},'color':{'value':'#ffffff'},'shape':{'type':'circle'},'opacity':{'value':0.5,'random':true},'size':{'value':3,'random':true},'line_linked':{'enable':false},'move':{'enable':true,'speed':1.5,'direction':'bottom','random':true,'straight':false,'out_mode':'out'}}});")
              f.write("function filterList(){let q=document.getElementById('search-bar').value.toLowerCase();document.querySelectorAll('details').forEach(d=>{let v=false;d.querySelectorAll('li').forEach(i=>{let t=i.textContent.toLowerCase();if(t.includes(q)){i.style.display='';v=true;}else{i.style.display='none';}});if(v){d.style.display='';if(q.length>0)d.open=true;}else{d.style.display='none';}})}</script></body></html>")
          EOF

      - name: Commit and Push
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Sidebar navigation only" && git push origin main)
