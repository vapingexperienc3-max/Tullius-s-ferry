name: Generate Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate nested index.html
        run: |
          python <<'EOF'
          import os

          # [파일 처리 및 인출 로직 - 기존 안정 버전 유지]
          # (중략: inject_width_style 및 파일 탐색 로직)
          # ...
          
          # [사이드바 변수 생성 로직 보장]
          sidebar_ferry = f"<details class='group-details' open><summary style='color:#ffffff; font-weight:bold; cursor:pointer; padding:5px 0; border-bottom:1px dashed #ffffff66; margin-bottom:10px;'>[📦 모드팩 아카이브]</summary><div style='padding-left:10px;'>{sidebar_ferry_modpack}</div></details>" + sidebar_ferry_normal
          sidebar_vault = f"<details class='group-details' open><summary style='color:#FFB000; font-weight:bold; cursor:pointer; padding:5px 0; border-bottom:1px dashed #FFB00066; margin-bottom:10px;'>[📦 모드팩 아카이브]</summary><div style='padding-left:10px;'>{sidebar_vault_modpack}</div></details>" + sidebar_vault_normal

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius Archive</title><style>")
              f.write("body { margin: 0; min-height: 100vh; background-color: #000; background-attachment: fixed; background-repeat: no-repeat; transition: opacity 0.4s; font-family: sans-serif; color: #eee; overflow-x: hidden; }")
              
              # 🖼️ 레이아웃 수정: 이미지가 짤리지 않게 contain 사용 및 텍스트 위치 하단 조정
              f.write(".theme-ferry { background-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 50%), url('skyrim.png'); background-size: contain !important; background-position: center bottom !important; }")
              f.write(".theme-vault { background-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 50%), url('fallout.png'); background-size: contain !important; background-position: center bottom !important; }")
              
              # 헤더 & 사이드바
              f.write(".top-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 2px solid rgba(255,255,255,0.1); }")
              f.write(".sidebar-nav { width: 300px; position: fixed; top: 110px; left: 40px; height: calc(100vh - 150px); background: rgba(0,0,0,0.8); border: 1px solid; border-radius: 8px; padding: 25px; overflow-y: auto; z-index: 100; transition: 0.3s; opacity: 0; visibility: hidden; }")
              f.write(".sidebar-nav.active { opacity: 1; visibility: visible; }")
              
              # 폰트 가림 방지: 타이틀 영역을 인물 얼굴 위가 아닌 왼쪽 상단 여백으로 배치
              f.write(".main-area { margin-left: 380px; padding-top: 100px; padding-right: 50px; position: relative; z-index: 10; }")
              f.write(".title-container { margin-bottom: 40px; pointer-events: none; }")
              f.write(".title-text { font-weight: 900; text-shadow: 0 0 20px rgba(0,0,0,1), 2px 2px 2px rgba(0,0,0,0.8); }")

              # [중략: 기타 스타일 및 모달 코드]
              f.write(".welcome-screen { position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: #000; }")
              f.write(".welcome-img { max-width: 600px; width: 80%; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }")
              
              f.write("</style></head><body>")
              f.write("<div id='particles-js' style='position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;'></div>")
              
              # 웰컴 스크린 (이미지 출력 누락 수정)
              f.write("<div id='welcome-screen' class='welcome-screen'><img src='welcome page.jpg' class='welcome-img' onerror='this.style.display=\"none\"'><h1 style='font-size: 2.2em; color: #fff;'>환영합니다, 드래곤본과 생존자 여러분</h1><p style='color: #888; font-weight:bold;'>상단의 테마 버튼을 눌러 아카이브를 소환하십시오.</p></div>")

              # 헤더
              f.write("<header class='top-header' id='top-header'><div style='width: 100%; max-width: 1300px; display: flex; justify-content: space-between; padding: 0 40px;'>")
              f.write("<div><button class='header-btn' id='btn-f' onclick='triggerTheme(\"ferry\")' style='border-color:#fff; color:#fff; margin-right:10px;'>🚣 Ferry (Skyrim)</button>")
              f.write("<button class='header-btn' id='btn-v' onclick='triggerTheme(\"vault\")' style='border-color:#FFB000; color:#FFB000;'>☢️ Vault 404</button></div>")
              f.write("<div><button class='header-btn' onclick='openModal()'>📖 가이드&후기</button></div></div></header>")

              f.write("<div class='wrapper' id='main-wrapper' style='display:none;'><div class='sidebar-nav' id='main-lnb'><h3 id='idx-t' style='border-bottom: 2px solid; padding-bottom: 10px;'>📜 INDEX</h3><div id='l-ferry'>" + sidebar_ferry + "</div><div id='l-vault' style='display:none;'>" + sidebar_vault + "</div></div>")
              f.write("<div class='main-area'><div class='title-container'>")
              f.write("<span id='title-ferry' class='title-text' style='color:#fff; font-size:4em; display:none;'>Tullius's Ferry</span>")
              f.write("<span id='title-vault' class='title-text' style='color:#FFB000; font-size:3.5em; display:none;'>Vault 404: Outpost</span></div>")
              f.write("<input type='text' id='search-bar' placeholder='파일 검색...' onkeyup='globalSearch()'><div id='a-ferry'>" + main_ferry + "</div><div id='a-vault' style='display:none;'>" + main_vault + "</div></div></div>")

              f.write("<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script><script>")
              
              # ☁️ 파티클 질감 수정: '비눗방울' 점 제거 및 흐릿한 안개 구현
              f.write("function updateParticles(m){ if(window.pJSDom && window.pJSDom.length){ window.pJSDom[0].pJS.fn.vendors.destroypJS(); window.pJSDom=[]; }")
              f.write("let c = m==='ferry' ? ")
              # 스카이림: 하얀 안개가 아래에서 위로 (크기를 키우고 투명도를 낮춤)
              f.write("{particles:{number:{value:25},color:{value:'#ffffff'},shape:{type:'circle'},opacity:{value:0.15,random:true},size:{value:120,random:true},line_linked:{enable:false},move:{enable:true,speed:0.3,direction:'top',random:true,out_mode:'out'}}} : ")
              # 폴아웃: 갈색/회색 먼지가 소용돌이침
              f.write("{particles:{number:{value:40},color:{value:['#FFB000','#555555','#333333']},shape:{type:'circle'},opacity:{value:0.2,random:true},size:{value:70,random:true},line_linked:{enable:false},move:{enable:true,speed:0.5,direction:'top',random:true,out_mode:'out'}}};")
              f.write("particlesJS('particles-js', c); }")
              
              # [중략: 테마 전환 및 검색 스크립트]
              f.write("</script></body></html>")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Fix Layout Overlap, Particle Texture, and Welcome Image" || exit 0
          git push origin main
