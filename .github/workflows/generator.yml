yaml
name: Generate File List Index

on:
  push:
    branches:
      - main  # HTML 파일이 있는 브랜치 이름
    paths:
      - '**.html' **# HTML 파일 변경 시에만 실행 (공백 추가됨)**

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate index.html
        run: |
          echo "<!DOCTYPE html><html><head><title>File List</title><meta charset='UTF-8'></head><body>" > index.html
          echo "<h1>파일 목록 자동 생성</h1><ul>" >> index.html
          # .html 파일들을 찾아 링크로 변환 (index.html은 제외)
          find . -maxdepth 2 -name "*.html" ! -name "index.html" | sed 's|^\./||' | while read line; do
            echo "<li><a href=\"$line\">$line</a></li>" >> index.html
          done
          echo "</ul></body></html>" >> index.html

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-generate index.html" || exit 0
          git push
