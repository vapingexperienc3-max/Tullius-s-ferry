name: Generate File List Index

on:
  push:
    branches:
      - main
    paths:
      - '**.html'
      - '!index.html'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate nested index.html
        run: |
          python <<EOF
          import os

          def generate_html_list(startpath):
              html = ""
              for root, dirs, files in sorted(os.walk(startpath)):
                  # 숨김 폴더 및 .github 제외
                  dirs[:] = [d for d in dirs if not d.startswith('.')]
                  
                  html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
                  if html_files:
                      rel_path = os.path.relpath(root, startpath)
                      display_dir = "Root" if rel_path == "." else rel_path
                      html += f"<h3>📂 {display_dir}</h3><ul>"
                      for f in sorted(html_files):
                          full_path = os.path.join(rel_path, f).replace('\\', '/')
                          if full_path.startswith('./'): full_path = full_path[2:]
                          html += f'<li><a href="{full_path}">{f}</a></li>'
                      html += "</ul>"
              return html

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Index</title>")
              f.write("<style>body{font-family:sans-serif;padding:40px;} li{margin:5px 0;}</style></head><body>")
              f.write("<h1>Tulius's Ferry Index</h1>")
              f.write(generate_html_list('.'))
              f.write("</body></html>")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generate index.html"
            git push
          fi
