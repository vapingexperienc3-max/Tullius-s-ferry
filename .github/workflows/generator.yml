- name: Generate nested index.html
        run: |
          python <<'EOF'
          import os

          def inject_width_style(filepath):
              style_code = """<style>body, .fr-view, #content, .main-container, .article-content, div[class*="content"] { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 10px !important; } img { max-width: 100% !important; height: auto !important; }</style>"""
              try:
                  with open(filepath, 'r', encoding='utf-8') as f_in:
                      content = f_in.read()
                  for nick in ["Ryl3", "ryl3", "RYL3"]: content = content.replace(nick, "")
                  if '<head>' in content: content = content.replace('<head>', '<head>' + style_code)
                  with open(filepath, 'w', encoding='utf-8') as f_out: f_out.write(content)
              except: pass

          sidebar_ferry_modpack, sidebar_ferry_normal = "", ""
          sidebar_vault_modpack, sidebar_vault_normal = "", ""
          main_ferry, main_vault = "", ""
          
          bg_skyrim = "skyrim.png"
          bg_vault = "fallout.png"
          
          for root, dirs, files in sorted(os.walk('.')):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
              if html_files:
                  rel_path = os.path.relpath(root, '.')
                  display_name = "MAIN ARCHIVE" if rel_path == "." else rel_path.upper()
                  fid = "f-" + rel_path.replace(os.sep, '-')
                  is_vault = any(kw in display_name for kw in ["VAULT", "FALLOUT", "폴아웃"])
                  
                  icon = "https://img.icons8.com/color/48/vault-boy.png" if is_vault else "https://img.icons8.com/ios-filled/50/ffffff/skyrim.png"
                  link_html = f"<a href='javascript:void(0)' onclick='showCat(\"{fid}\")' class='sidebar-link' id='l-{fid}'>- {display_name}</a>"
                  
                  content_html = f"<div id='{fid}' class='cat-content' style='display:none;'>"
                  content_html += f"<details open class='folder-details' style='margin-bottom: 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 4px; overflow: hidden;'>"
                  content_html += f"<summary style='padding: 15px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor:pointer;'><span><img src='{icon}' style='width:18px; margin-right:10px;'>{display_name}</span><span style='font-size: 0.8em; color: #888;'>[{len(html_files)} FILES]</span></summary>"
                  content_html += "<ul style='margin: 0; padding: 15px 40px; list-style-type: square;'>"
                  for f_name in sorted(html_files):
                      path = os.path.join(root, f_name)
                      inject_width_style(path)
                      url = os.path.relpath(path, '.').replace(os.sep, '/')
                      disp = f_name.replace('.html', '').split(' (')[0].replace(' - 툴리우스 채널', '')
                      link_color = "#00ff42" if is_vault else "#ffce54"
                      content_html += f'<li style="margin: 10px 0;"><a href="{url}" target="_blank" class="file-link" style="color: {link_color}; text-decoration: none; font-weight: 500;">{disp}</a></li>'
                  content_html += "</ul></details></div>"

                  if "[모드팩]" in display_name:
                      if is_vault: sidebar_vault_modpack += link_html
                      else: sidebar_ferry_modpack += link_html
                  else:
                      if is_vault: sidebar_vault_normal += link_html
                      else: sidebar_ferry_normal += link_html
                  
                  if is_vault: main_vault += content_html
                  else: main_ferry += content_html

          def wrap_modpack(content, color):
              if not content: return ""
              return f"<details class='group-details' open><summary style='color:{color}; font-weight:bold; cursor:pointer; padding:5px 0; border-bottom:1px dashed {color}66; margin-bottom:10px;'>[📦 모드팩]</summary><div style='padding-left:10px;'>{content}</div></details>"

          sidebar_ferry = wrap_modpack(sidebar_ferry_modpack, "#ffce54") + sidebar_ferry_normal
          sidebar_vault = wrap_modpack(sidebar_vault_modpack, "#00ff42") + sidebar_vault_normal

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius Archive</title><style>")
              f.write("body { margin: 0; min-height: 100vh; background-color: #000; background-attachment: fixed; background-repeat: no-repeat; transition: background-color 0.5s; font-family: sans-serif; color: #eee; overflow-x: hidden; }")
              f.write(".theme-ferry { background-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.2) 100%), url('" + bg_skyrim + "'); background-size: 90% !important; background-position: right -150px top 20% !important; }")
              f.write(".theme-vault { background-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.2) 100%), url('" + bg_vault + "'); background-size: cover !important; background-position: calc(100% + 280px) center !important; }")
              
              f.write(".top-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 2px solid; transition: border-color 0.3s; }")
              f.write(".header-container { width: 100%; max-width: 1300px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }")
              f.write(".header-btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; border: 1px solid; background: transparent; color: #fff; transition: 0.3s; }")
              
              # LNB 애니메이션 핵심: 접혀있을 때 높이 0, 안보임 처리
              f.write(".sidebar-nav { width: 300px; position: sticky; top: 110px; height: auto; max-height: calc(100vh - 150px); background: rgba(0,0,0,0.8); border: 1px solid transparent; border-radius: 8px; padding: 0 25px; backdrop-filter: blur(10px); overflow-y: auto; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; visibility: hidden; }")
              f.write(".sidebar-nav.active { opacity: 1; visibility: visible; border-color: inherit; padding: 25px; }")
              
              f.write(".scroll-wrap { display: none; transform: translateY(-20px); transition: 0.5s; }")
              f.write(".scroll-wrap.active { display: block; transform: translateY(0); }")
              
              f.write(".sidebar-link { display: block; color: #999; text-decoration: none !important; padding: 10px 0; font-size: 0.95em; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03); }")
              f.write(".theme-ferry .top-header { border-color: #ffce54; } .theme-vault .top-header { border-color: #00ff42; }")
              f.write(".theme-ferry .sidebar-link:hover, .theme-ferry .sidebar-link.active { color: #ffce54 !important; }")
              f.write(".theme-vault .sidebar-link:hover, .theme-vault .sidebar-link.active { color: #00ff42 !important; }")
              f.write("</style></head>")
          
              f.write("<body><div id='particles-js' style='position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;'></div>")
              
              f.write("<header class='top-header'><div class='header-container'><div class='header-left'>")
              f.write("<button class='header-btn' id='btn-f' onclick='triggerTheme(\"ferry\")'>🚣 Ferry (Skyrim)</button>")
              f.write("<button class='header-btn' id='btn-v' onclick='triggerTheme(\"vault\")'>☢️ Vault 404 (Fallout)</button></div>")
              f.write("<div class='header-right'><button class='header-btn' onclick='openModal()' style='border-color:#555;'>📖 가이드/후기</button>")
              f.write("<a href='https://github.com/" + os.environ.get('GITHUB_REPOSITORY', '') + "/issues' target='_blank' class='header-btn' style='border-color:#3a86ff;'>📢 에러제보</a></div></div></header>")

              f.write("<div class='wrapper'><div class='sidebar-nav' id='main-lnb'><h3 id='idx-t' style='font-size: 1em; border-bottom: 2px solid; padding-bottom: 10px; margin-bottom:15px;'>📜 INDEX</h3>")
              f.write("<div id='l-ferry' class='scroll-wrap'>" + sidebar_ferry + "</div>")
              f.write("<div id='l-vault' class='scroll-wrap'>" + sidebar_vault + "</div></div>")
              
              f.write("<div class='main-area'><div style='border-bottom: 2px solid rgba(255,255,255,0.1); margin-bottom: 30px; padding-bottom: 20px; min-height: 100px; display: flex; align-items: center;'>")
              f.write("<span id='title-ferry' style='font-weight: 900; color: #ffffff; font-size: 3.5em; display: none;'>Tullius's Ferry</span>")
              f.write("<span id='title-vault' style='font-weight: 900; color: #00ff42; font-size: 3em; display: none;'>Vault 404</span></div>")
              f.write("<div id='main-search-area' style='display:none;'><input type='text' id='search-bar' placeholder='파일 검색...' onkeyup='globalSearch()'></div>")
              f.write("<div id='a-ferry'>" + main_ferry + "</div><div id='a-vault' style='display:none;'>" + main_vault + "</div></div></div>")
          
              f.write("<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script><script>")
              # 기믹 핵심: 트리거 함수
              f.write("function triggerTheme(m){")
              f.write("  const lnb = document.getElementById('main-lnb');")
              f.write("  const search = document.getElementById('main-search-area');")
              f.write("  lnb.classList.remove('active');")
              f.write("  setTimeout(() => {")
              f.write("    switchTheme(m);")
              f.write("    lnb.classList.add('active');")
              f.write("    search.style.display = 'block';")
              f.write("  }, 300);")
              f.write("}")
              
              f.write("function switchTheme(m){")
              f.write("  const b=document.body; const lF=document.getElementById('l-ferry'); const lV=document.getElementById('l-vault');")
              f.write("  const tF=document.getElementById('title-ferry'); const tV=document.getElementById('title-vault');")
              f.write("  if(m==='ferry'){")
              f.write("    b.className='theme-ferry'; tF.style.display='block'; tV.style.display='none';")
              f.write("    lV.classList.remove('active'); lV.style.display='none'; lF.style.display='block'; lF.classList.add('active');")
              f.write("    document.getElementById('a-ferry').style.display='block'; document.getElementById('a-vault').style.display='none';")
              f.write("  } else {")
              f.write("    b.className='theme-vault'; tF.style.display='none'; tV.style.display='block';")
              f.write("    lF.classList.remove('active'); lF.style.display='none'; lV.style.display='block'; lV.classList.add('active');")
              f.write("    document.getElementById('a-ferry').style.display='none'; document.getElementById('a-vault').style.display='block';")
              f.write("  }")
              f.write("}")
              # 초기 상태: 아무것도 안 보여줌 (버튼 누르기 전까지)
              f.write("window.onload=()=>{ console.log('Ready to deploy archive'); };")
              f.write("</script></body></html>")
          EOF
