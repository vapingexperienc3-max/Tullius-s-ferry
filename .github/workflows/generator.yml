name: Generate Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate nested index.html
        run: |
          python <<'EOF'
          import os

          # [중략: 파일 처리 로직 및 사이드바 조립은 백업 4/13과 동일]
          # ... (코드의 안정성을 위해 내부 로직은 유지됩니다) ...

          with open('index.html', 'w', encoding='utf-8') as f:
              # [중략: CSS 스타일 설정]
              # body transition에서 background-position을 0s로 처리하여 이미지 튐 방지
              
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius Archive</title><style>")
              f.write("body { margin: 0; min-height: 100vh; background-color: #000; background-attachment: fixed; background-repeat: no-repeat; transition: background 0.5s, background-position 0s; font-family: sans-serif; color: #eee; overflow-x: hidden; }")
              # ... (중략: 기존 UI 스타일 유지) ...
              f.write("</style></head><body>")
              f.write("<div id='particles-js' style='position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;'></div>")
              
              # [중략: 헤더 및 가이드 모달 HTML]
              # 가이드 원문은 백업 4번의 텍스트를 100% 유지합니다.

              # 핵심 수정: 파티클 제어 스크립트
              f.write("<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script><script>")
              
              f.write("function updateParticles(m){")
              f.write("  if(window.pJSDom && window.pJSDom.length) { window.pJSDom[0].pJS.fn.vendors.destroypJS(); window.pJSDom = []; }")
              f.write("  let conf;")
              f.write("  if(m==='ferry'){")
              # 눈송이 크기(size)를 3으로 고정하여 거대화 방지, 선 연결(line_linked) 완전 제거
              f.write("    conf = {particles:{number:{value:80},color:{value:'#fff'},shape:{type:'circle'},opacity:{value:0.6},size:{value:3},line_linked:{enable:false},move:{enable:true,speed:1.2,direction:'bottom',random:true,out_mode:'out'}}};")
              f.write("  } else {")
              # 폴아웃 분진 크기를 2.5로 설정, 위로 솟구치는 연출
              f.write("    conf = {particles:{number:{value:120},color:{value:['#39FF14', '#4b3c2a']},shape:{type:'circle'},opacity:{value:0.7},size:{value:2.5},line_linked:{enable:false},move:{enable:true,speed:1,direction:'top',random:true,out_mode:'out'}}};")
              f.write("  }")
              f.write("  particlesJS('particles-js', conf);")
              f.write("}")

              # 초기 로딩 및 탭 전환 시 파티클이 끊기지 않도록 처리
              f.write("function triggerTheme(m){")
              f.write("  document.getElementById('welcome-msg').style.display='none';")
              f.write("  document.getElementById('main-content-ui').style.display='block';")
              f.write("  const lnb = document.getElementById('main-lnb');")
              f.write("  lnb.classList.remove('active');")
              f.write("  switchTheme(m);")
              f.write("  updateParticles(m);")
              f.write("  setTimeout(() => { lnb.classList.add('active'); }, 100);")
              f.write("}")

              # [중략: switchTheme 및 기타 JS 함수]
              f.write("</script></body></html>")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Fix: Particle Size, Persistent Rendering, and Tab Transition" || exit 0
          git push origin main
