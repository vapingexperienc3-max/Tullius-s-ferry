name: Generate File List Index

on:
  push:
    branches:
      - main
    paths:
      - '**.html'
      - '!index.html'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate nested index.html
        run: |
          python <<EOF
          import os

          def generate_html_list(startpath):
              html_content = ""
              for root, dirs, files in sorted(os.walk(startpath)):
                  dirs[:] = [d for d in dirs if not d.startswith('.')]
                  html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
                  
                  if html_files:
                      rel_path = os.path.relpath(root, startpath)
                      display_name = "📂 Root Directory" if rel_path == "." else f"📂 {rel_path}"
                      
                      # 쌈뽕한 디자인 적용된 details 태그
                      html_content += f"<details style='margin-bottom: 15px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; overflow: hidden;'>"
                      html_content += f"<summary style='background-color: rgba(255, 255, 255, 0.15); padding: 15px; font-weight: bold; cursor: pointer; list-style: none; color: #fff; border-bottom: 1px solid rgba(255, 255, 255, 0.1);'>{display_name} ({len(html_files)}개)</summary>"
                      html_content += "<ul style='margin: 0; padding: 15px 40px; list-style-type: disc;'>"
                      
                      for f in sorted(html_files):
                          raw_path = os.path.join(rel_path, f)
                          clean_path = raw_path.replace(os.sep, '/')
                          if clean_path.startswith('./'): clean_path = clean_path[2:]
                          
                          html_content += f'<li style="margin: 10px 0;"><a href="{clean_path}" target="_blank" style="color: #81ecec; text-decoration: none; font-weight: 500;">{f}</a></li>'
                      
                      html_content += "</ul></details>"
              return html_content

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'>")
              f.write("<meta name='viewport' content='width=device-width, initial-scale=1.0'>")
              f.write("<title>Tulius's Ferry</title>")
              # --- 스카이림 쌈뽕 배경 스타일 시작 ---
              f.write("<style>")
              f.write("body { background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,1) 95%), linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://static.kinguin.net/media/catalog/category/cache/1/hi_image/9df78eab33525d08d6e5fb8d27136e95/The-Elder-Scrolls-V-Skyrim.jpg');")
              f.write("background-size: 100% auto; background-repeat: no-repeat; background-position: top center; background-attachment: scroll; background-color: #000;")
              f.write("font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; line-height: 1.6; padding: 30px; max-width: 1000px; margin: auto; color: #eee; }")
              f.write("h1 { border-bottom: 2px solid #586069; padding-bottom: .3em; color: #fff; }")
              f.write("summary::-webkit-details-marker { display: none; }")
              f.write("a:hover { color: #55efc4 !important; text-decoration: underline; }")
              f.write("</style></head><body>")
              # --- 스타일 끝 ---
              f.write("<h1>Tulius's Ferry</h1>")
              f.write("<p style='color: #bdc3c7;'>'언젠가 이런 날이 올 줄 알았지. 난 알았어. 하지만 아무도 믿지 않았지.' (I knew it would come to this one day. I knew. And no one believed.).</p>")
              f.write(generate_html_list('.'))
              f.write("</body></html>")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "style: apply skyrim theme via auto-generator"
            git push
          fi
