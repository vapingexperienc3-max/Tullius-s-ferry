name: Generate Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate nested index.html
        run: |
          python <<'EOF'
          import os

          def inject_width_style(filepath):
              style_code = """<style>body, .fr-view, #content, .main-container, .article-content, div[class*="content"] { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 10px !important; } img { max-width: 100% !important; height: auto !important; }</style>"""
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  for nick in ["Ryl3", "ryl3", "RYL3"]: content = content.replace(nick, "")
                  if '<head>' in content: content = content.replace('<head>', '<head>' + style_code)
                  with open(filepath, 'w', encoding='utf-8') as f: f.write(content)
              except: pass

          # 🚀 초기 변수 선언 (인덱스 증발 방지)
          sidebar_ferry_modpack, sidebar_ferry_normal = "", ""
          sidebar_vault_modpack, sidebar_vault_normal = "", ""
          main_ferry, main_vault = "", ""
          
          for root, dirs, files in sorted(os.walk('.')):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
              if html_files:
                  rel_path = os.path.relpath(root, '.')
                  display_name = "MAIN ARCHIVE" if rel_path == "." else rel_path.upper()
                  fid = "f-" + rel_path.replace(os.sep, '-')
                  is_vault = any(kw in display_name for kw in ["VAULT", "FALLOUT", "폴아웃"])
                  
                  icon = "https://img.icons8.com/color/48/vault-boy.png" if is_vault else "https://img.icons8.com/ios-filled/50/ffffff/skyrim.png"
                  link_html = f"<a href='javascript:void(0)' onclick='showCat(\"{fid}\")' class='sidebar-link' id='l-{fid}'>- {display_name}</a>"
                  
                  content_html = f"<div id='{fid}' class='cat-content' style='display:none;'><details open style='background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.15); border-radius:8px; margin-bottom:20px;'><summary style='padding:15px; font-weight:bold; color:#fff; cursor:pointer;'><img src='{icon}' style='width:18px; margin-right:10px;'>{display_name}</summary><ul style='margin:0; padding:15px 40px; list-style-type:square;'>"
                  for f_name in sorted(html_files):
                      path = os.path.join(root, f_name)
                      inject_width_style(path)
                      url = os.path.relpath(path, '.').replace(os.sep, '/')
                      disp = f_name.replace('.html', '').split(' (')[0].replace(' - 툴리우스 채널', '')
                      link_color = "#FFB000" if is_vault else "#ffffff"
                      content_html += f'<li style="margin:10px 0;"><a href="{url}" target="_blank" class="file-link" style="color:{link_color}; text-decoration:none;">{disp}</a></li>'
                  content_html += "</ul></details></div>"

                  if "[모드팩]" in display_name:
                      if is_vault: sidebar_vault_modpack += link_html
                      else: sidebar_ferry_modpack += link_html
                  else:
                      if is_vault: sidebar_vault_normal += link_html
                      else: sidebar_ferry_normal += link_html
                  if is_vault: main_vault += content_html
                  else: main_ferry += content_html

          sf_final = f"<details open style='margin-bottom:15px;'><summary style='color:#fff; font-weight:bold; cursor:pointer; padding:5px 0; border-bottom:1px solid #ffffff44;'>📦 모드팩 아카이브</summary><div style='padding-left:10px;'>{sidebar_ferry_modpack}</div></details>{sidebar_ferry_normal}"
          sv_final = f"<details open style='margin-bottom:15px;'><summary style='color:#FFB000; font-weight:bold; cursor:pointer; padding:5px 0; border-bottom:1px solid #FFB00044;'>📦 모드팩 아카이브</summary><div style='padding-left:10px;'>{sidebar_vault_modpack}</div></details>{sidebar_vault_normal}"

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius Archive</title><style>")
              f.write("body { margin: 0; min-height: 100vh; background-color: #000; font-family: sans-serif; color: #eee; overflow-x: hidden; transition: 0.4s; }")
              
              # 🖼️ 배경 비율 최적화: cover를 쓰되 줌을 최소화하도록 설정
              f.write(".theme-ferry { background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.3) 60%), url('skyrim.png') center bottom / contain no-repeat fixed black; }")
              f.write(".theme-vault { background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.3) 60%), url('fallout.png') center bottom / contain no-repeat fixed black; }")
              
              f.write(".top-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 2px solid rgba(255,255,255,0.1); }")
              f.write(".header-container { width: 100%; max-width: 1400px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; box-sizing: border-box; }")
              f.write(".header-btn { padding: 8px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; border: 1px solid; background: transparent; transition: 0.3s; text-decoration: none !important; font-size: 0.9em; }")
              f.write(".sidebar-nav { width: 330px; position: fixed; top: 110px; left: 40px; height: calc(100vh - 150px); background: rgba(0,0,0,0.85); border: 1px solid; border-radius: 8px; padding: 25px; overflow-y: auto; z-index: 100; opacity: 0; visibility: hidden; transition: 0.3s; box-sizing: border-box; }")
              f.write(".sidebar-nav.active { opacity: 1; visibility: visible; }")
              f.write(".main-area { margin-left: 420px; padding: 110px 60px 50px 0; position: relative; z-index: 10; }")
              f.write(".sidebar-link { display: block; color: #888; text-decoration: none !important; padding: 10px 0; font-size: 0.95em; border-bottom: 1px solid rgba(255,255,255,0.05); }")
              f.write(".modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }")
              f.write(".modal-content { background: #0f1217; margin: 5% auto; padding: 40px; border: 1px solid; border-radius: 15px; width: 85%; max-width: 750px; position: relative; max-height: 85vh; overflow-y: auto; }")
              f.write("</style></head><body>")
              
              f.write("<div id='particles-js' style='position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;'></div>")
              
              # 🖼️ 웰컴 스크린 수정 (.png 확장자 및 문구 반영)
              f.write("<div id='welcome-screen' style='position:fixed; top:70px; left:0; width:100%; height:calc(100vh - 70px); display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; z-index:2000;'>")
              f.write("<img src='welcome page.png' style='max-width:800px; width:90%; border-radius:12px; margin-bottom:30px; box-shadow:0 0 40px #000;'>")
              f.write("<h1 style='color:#fff; font-size:2.2em; text-align:center;'>환영합니다, 드래곤본과 생존자 여러분</h1><p style='color:#bbb; font-size:1.2em;'>상단의 버튼을 누르면 아카이브로 연결됩니다</p></div>")

              # 상단 헤더
              f.write("<header class='top-header'><div class='header-container'><div>")
              f.write("<button class='header-btn' id='btn-f' onclick='triggerTheme(\"ferry\")' style='border-color:#fff; color:#fff; margin-right:12px;'>🚣 Ferry (Skyrim)</button>")
              f.write("<button class='header-btn' id='btn-v' onclick='triggerTheme(\"vault\")' style='border-color:#FFB000; color:#FFB000;'>☢️ Vault 404</button></div>")
              f.write("<div><button class='header-btn' style='border-color:#ccc; color:#ccc; margin-right:12px;' onclick='openModal()'>📖 가이드 & 후기</button>")
              f.write("<a href='https://github.com/vapingexperienc3-max/Tullius-s-ferry/issues' target='_blank' class='header-btn' style='border-color:#58a6ff; color:#58a6ff;'>📢 피드백 제보</a></div></div></header>")

              # 📖 가이드 모달 (백업 5번 내용 완전 복구)
              f.write("<div id='guideModal' class='modal'><div class='modal-content' id='modal-c'><span style='position:absolute; top:20px; right:25px; font-size:28px; cursor:pointer; color:#666;' onclick='closeModal()'>&times;</span><h3 id='modal-t' style='margin-top:0;'>📜 가이드 및 후기</h3>")
              f.write("<div style='color:#ddd; line-height:1.8;'><p style='background:rgba(255,255,255,0.05); padding:20px; border-radius:10px;'><strong>💡 이용 팁:</strong><br>- 대부분의 파일은 HTML 양식으로 백업되어 있습니다.<br>- 질문, 피드백, 로그는 폴더 하나에 구분없이 넣었습니다. 양해 바랍니다.<br>- 주요 자료는 테라박스에 원본으로 백업되어 있습니다. <span style='color:#FFB000; font-weight:bold;'>(파일 암호 필수 확인)</span></p>")
              f.write("<div style='border-top:1px solid rgba(255,255,255,0.15); padding-top:15px; margin-top:15px;'><strong>✍️ 후기:</strong><br>공장장 이 개같은 년, 너 아니었음 이거 시작도 안 했어 알아? 알면 소븐가드에서 우릴 위해 술잔이나 들어달라고.<br>툴붕이들은 아프지 말고.</div></div></div></div>")

              # 메인 컨텐츠
              f.write("<div id='main-wrapper' style='display:none;'><div class='sidebar-nav' id='main-lnb'><h3 id='idx-t' style='border-bottom:2px solid; padding-bottom:10px;'>📜 INDEX</h3><div id='l-ferry'>" + sf_final + "</div><div id='l-vault' style='display:none;'>" + sv_final + "</div></div>")
              f.write("<div class='main-area'>")
              f.write("<h1 id='title-ferry' style='color:#fff; font-size:4.5em; margin:0 0 20px 0; display:none;'>Tullius's Ferry</h1>")
              f.write("<h1 id='title-vault' style='color:#FFB000; font-size:4em; margin:0 0 20px 0; display:none;'>Vault 404: Outpost</h1>")
              f.write("<input type='text' id='search-bar' placeholder='파일 검색...' style='width:100%; padding:15px; border-radius:30px; border:1px solid #444; background:rgba(255,255,255,0.1); color:#fff; margin-bottom:40px;' onkeyup='globalSearch()'>")
              f.write("<div id='a-ferry'>" + main_ferry + "</div><div id='a-vault' style='display:none;'>" + main_vault + "</div></div></div>")

              f.write("<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script><script>")
              f.write("function openModal(){ document.getElementById('guideModal').style.display='block'; } function closeModal(){ document.getElementById('guideModal').style.display='none'; }")
              
              # ☁️ 입자 효과 복구 (시인성 상향)
              f.write("function updateParticles(m){ if(window.pJSDom && window.pJSDom.length){ window.pJSDom[0].pJS.fn.vendors.destroypJS(); window.pJSDom=[]; }")
              f.write("let c = m==='ferry' ? ")
              f.write("{particles:{number:{value:18},color:{value:'#ffffff'},opacity:{value:0.25},size:{value:150,random:true},move:{enable:true,speed:0.4,direction:'top',out_mode:'out'}}} : ")
              f.write("{particles:{number:{value:25},color:{value:['#FFB000','#666']},opacity:{value:0.3},size:{value:120,random:true},move:{enable:true,speed:0.6,direction:'top',out_mode:'out'}}};")
              f.write("particlesJS('particles-js', c); }")
              
              f.write("function triggerTheme(m){ document.getElementById('welcome-screen').style.display='none'; document.getElementById('main-wrapper').style.display='flex'; switchTheme(m); updateParticles(m); document.getElementById('main-lnb').classList.add('active'); }")
              f.write("function switchTheme(m){ const b=document.body; const lF=document.getElementById('l-ferry'); const lV=document.getElementById('l-vault'); const tF=document.getElementById('title-ferry'); const tV=document.getElementById('title-vault'); const aF=document.getElementById('a-ferry'); const aV=document.getElementById('a-vault'); const lnb=document.getElementById('main-lnb'); const idx=document.getElementById('idx-t'); const mc=document.getElementById('modal-c'); if(m==='ferry'){ b.className='theme-ferry'; lF.style.display='block'; lV.style.display='none'; tF.style.display='block'; tV.style.display='none'; aF.style.display='block'; aV.style.display='none'; lnb.style.borderColor='#fff'; idx.style.color='#fff'; idx.style.borderColor='#fff'; mc.style.borderColor='#fff'; } else { b.className='theme-vault'; lF.style.display='none'; lV.style.display='block'; tF.style.display='none'; tV.style.display='block'; aF.style.display='none'; aV.style.display='block'; lnb.style.borderColor='#FFB000'; idx.style.color='#FFB000'; idx.style.borderColor='#FFB000'; mc.style.borderColor='#FFB000'; } }")
              f.write("function showCat(fid){ document.querySelectorAll('.cat-content').forEach(c=>c.style.display='none'); document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active')); document.getElementById(fid).style.display='block'; document.getElementById('l-'+fid).classList.add('active'); window.scrollTo({top:0,behavior:'smooth'}); }")
              f.write("function globalSearch(){ let q=document.getElementById('search-bar').value.toLowerCase(); document.querySelectorAll('.cat-content').forEach(cat=>{ let files=cat.querySelectorAll('.file-link'); let has=false; files.forEach(f=>{ let t=f.innerText.toLowerCase(); if(q===''||t.includes(q)){ f.parentElement.style.display='block'; has=true; } else f.parentElement.style.display='none'; }); cat.style.display=(q===''?'none':(has?'block':'none')); }); }")
              f.write("</script></body></html>")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Final Correction: Welcome Image (.png), Full Guide Text, and UI Sync" || exit 0
          git push origin main
