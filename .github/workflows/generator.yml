name: Generate Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate nested index.html
        run: |
          python <<'EOF'
          import os

          def inject_width_style(filepath):
              style_code = """<style>body, .fr-view, #content, .main-container, .article-content, div[class*="content"] { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 10px !important; } img { max-width: 100% !important; height: auto !important; }</style>"""
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  for nick in ["Ryl3", "ryl3", "RYL3"]: content = content.replace(nick, "")
                  if '<head>' in content: content = content.replace('<head>', '<head>' + style_code)
                  with open(filepath, 'w', encoding='utf-8') as f: f.write(content)
              except: pass

          sidebar_ferry_modpack, sidebar_ferry_normal = "", ""
          sidebar_vault_modpack, sidebar_vault_normal = "", ""
          main_ferry, main_vault = "", ""
          
          for root, dirs, files in sorted(os.walk('.')):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
              if html_files:
                  rel_path = os.path.relpath(root, '.')
                  display_name = "MAIN ARCHIVE" if rel_path == "." else rel_path.upper()
                  fid = "f-" + rel_path.replace(os.sep, '-')
                  is_vault = any(kw in display_name for kw in ["VAULT", "FALLOUT", "폴아웃"])
                  icon = "https://img.icons8.com/color/48/vault-boy.png" if is_vault else "https://img.icons8.com/ios-filled/50/ffffff/skyrim.png"
                  link_html = f"<a href='javascript:void(0)' onclick='showCat(\"{fid}\")' class='sidebar-link' id='l-{fid}'>- {display_name}</a>"
                  
                  content_html = f"<div id='{fid}' class='cat-content' style='display:none;'><details open class='folder-details' style='margin-bottom:15px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;'>"
                  content_html += f"<summary style='padding:15px; font-weight:bold; color:#fff; display:flex; align-items:center; justify-content:space-between; cursor:pointer;'><span><img src='{icon}' style='width:18px; margin-right:10px;'>{display_name}</span></summary><ul style='margin:0; padding:15px 40px; list-style-type:square;'>"
                  for f_name in sorted(html_files):
                      path = os.path.join(root, f_name)
                      inject_width_style(path)
                      url = os.path.relpath(path, '.').replace(os.sep, '/')
                      disp = f_name.replace('.html', '').split(' (')[0].replace(' - 툴리우스 채널', '')
                      link_color = "#FFB000" if is_vault else "#ffffff"
                      content_html += f'<li style="margin:10px 0;"><a href="{url}" target="_blank" class="file-link" style="color:{link_color}; text-decoration:none; font-weight:500;">{disp}</a></li>'
                  content_html += "</ul></details></div>"

                  if "[모드팩]" in display_name:
                      if is_vault: sidebar_vault_modpack += link_html
                      else: sidebar_ferry_modpack += link_html
                  else:
                      if is_vault: sidebar_vault_normal += link_html
                      else: sidebar_ferry_normal += link_html
                  if is_vault: main_vault += content_html
                  else: main_ferry += content_html

          # 에러 발생 지점 수정: 변수 정의 보장
          sidebar_ferry = f"<details class='group-details' open><summary style='color:#ffffff; font-weight:bold; cursor:pointer; padding:5px 0; border-bottom:1px dashed #ffffff66; margin-bottom:10px;'>[📦 모드팩 아카이브]</summary><div style='padding-left:10px;'>{sidebar_ferry_modpack}</div></details>" + sidebar_ferry_normal
          sidebar_vault = f"<details class='group-details' open><summary style='color:#FFB000; font-weight:bold; cursor:pointer; padding:5px 0; border-bottom:1px dashed #FFB00066; margin-bottom:10px;'>[📦 모드팩 아카이브]</summary><div style='padding-left:10px;'>{sidebar_vault_modpack}</div></details>" + sidebar_vault_normal

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius Archive</title><style>")
              f.write("body { margin: 0; min-height: 100vh; background-color: #000; background-attachment: fixed; background-repeat: no-repeat; transition: opacity 0.4s ease-in-out; font-family: sans-serif; color: #eee; overflow-x: hidden; }")
              f.write(".theme-ferry { background-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.2) 100%), url('skyrim.png'); background-size: 90% !important; background-position: right -150px top 20% !important; }")
              f.write(".theme-vault { background-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.2) 100%), url('fallout.png'); background-size: cover !important; background-position: center !important; }")
              f.write(".top-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 2px solid rgba(255,255,255,0.1); transition: 0.3s; }")
              f.write(".header-container { width: 100%; max-width: 1300px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }")
              f.write(".header-btn { padding: 0 18px; height: 40px; border-radius: 6px; font-weight: bold; cursor: pointer; border: 1px solid; background: transparent; color: #fff; transition: 0.3s; font-size: 0.9em; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; box-sizing: border-box; }")
              f.write(".sidebar-nav { width: 300px; min-width: 300px; position: sticky; top: 110px; height: fit-content; background: rgba(0,0,0,0.85); border: 1px solid; border-radius: 8px; padding: 25px; box-sizing: border-box; transition: 0.3s; opacity: 0; visibility: hidden; }")
              f.write(".sidebar-nav.active { opacity: 1; visibility: visible; }")
              f.write(".sidebar-link { display: block; color: #888; text-decoration: none !important; padding: 10px 0; font-size: 0.95em; transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.03); }")
              f.write(".theme-ferry .sidebar-link:hover, .theme-ferry .sidebar-link.active { color: #ffffff !important; text-shadow: 0 0 12px #ffffff; font-weight: bold; }")
              f.write(".theme-vault .sidebar-link:hover, .theme-vault .sidebar-link.active { color: #FFB000 !important; text-shadow: 0 0 12px #FFB000; font-weight: bold; }")
              f.write(".welcome-screen { position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; text-align: center; background: #000; }")
              f.write(".welcome-img { max-width: 650px; width: 85%; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.9); margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); }")
              f.write(".welcome-text { font-size: 2.5em; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); margin: 0; }")
              f.write(".modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }")
              f.write(".modal-content { background: #0f1217; margin: 5% auto; padding: 40px; border: 1px solid; border-radius: 15px; width: 85%; max-width: 750px; position: relative; max-height: 80vh; overflow-y: auto; }")
              f.write(".close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; cursor: pointer; color: #666; }")
              f.write("#search-bar { width: 100%; padding: 15px 25px; margin-bottom: 25px; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; color: #fff; outline: none; box-sizing: border-box; }")
              f.write("</style></head><body>")
              f.write("<div id='particles-js' style='position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;'></div>")
              f.write("<header class='top-header' id='top-header'><div class='header-container'><div class='header-left'>")
              f.write("<button class='header-btn' id='btn-f' onclick='triggerTheme(\"ferry\")' style='border-color:#ffffff; color:#ffffff; margin-right:10px;'>🚣 Ferry (Skyrim)</button>")
              f.write("<button class='header-btn' id='btn-v' onclick='triggerTheme(\"vault\")' style='border-color:#FFB000; color:#FFB000;'>☢️ Vault 404</button></div>")
              f.write("<div class='header-right'><button class='header-btn' onclick='openModal()' id='guide-btn' style='border-color:#aaa; margin-right:10px;'>📖 가이드&후기</button>")
              f.write("<a href='https://github.com/vapingexperienc3-max/Tullius-s-ferry/issues' target='_blank' class='header-btn' style='border-color:#3a86ff; color:#3a86ff;'>📢 건의 및 에러 제보</a></div></div></header>")
              f.write("<div id='welcome-screen' class='welcome-screen'><img src='welcome page.jpg' class='welcome-img'><h1 class='welcome-text'>환영합니다, 드래곤본과 생존자 여러분</h1><p style='color: #888; margin-top: 15px; font-weight:bold;'>상단의 테마 버튼을 눌러 아카이브를 소환하십시오.</p></div>")
              f.write("<div id='guideModal' class='modal'><div class='modal-content' id='modal-c'><span class='close-btn' onclick='closeModal()'>&times;</span><h3 id='modal-t' style='margin-top:0;'>📜 가이드 및 후기</h3><div style='color:#ddd; line-height:1.8;'>")
              f.write("<p style='background:rgba(255,255,255,0.03); padding:20px; border-radius:8px;'><strong>💡 이용 팁:</strong><br>- 대부분의 파일은 HTML 양식으로 백업되어 있습니다. <strong>(기술적 한계로 영상은 출력되지 않습니다.)</strong><br>- <strong>질문, 피드백, 로그</strong>의 경우 일일히 버전이나 문제 유형을 구분하기 어려워 <strong>폴더 하나에 구분없이 넣었습니다.</strong> 양해 바랍니다.<br>- <strong>미해결 탭</strong>의 경우 해결되지 않았다고 생각되는 이슈들을 백업해 놓았습니다. <strong>해결된 문제가 있으면 피드백 부탁드립니다.</strong><br>- 자잘한 픽스나 번역은 원본 대신 HTML 링크로 백업되었으며, <strong>외부 링크(구드/메가)가 터지는 경우는 대처가 어렵습니다.</strong><br>- <strong>모드팩, 프리셋, 의상, 동료</strong> 등 주요 자료는 테라박스에 원본으로 백업되어 있습니다. <span style='color:#FFB000; font-weight:bold;'>(파일 암호 필수 확인)</span></p>")
              f.write("<p><span style='color:#FFB000; font-weight:bold;'>* 백업 관련 피드백은 좌측 상단의 제보 버튼(깃허브 로그인 필요)이나 아카라이브(코네) 피드백 글에 댓글 부탁드립니다.</span></p>")
              f.write("<div style='border-top:1px solid rgba(255,255,255,0.15); padding-top:15px; margin-top:15px;'><strong>✍️ 후기:</strong><br>공장장 이 개같은 년, 너 아니었음 이거 시작도 안 했어 알아? 알면 소븐가드에서 우릴 위해 술잔이나 들어달라고.<br>툴붕이들은 아프지 말고. 너네 없어지면 15년 동안 후속작 유기하는 토드 새끼 누가 욕해주냐?</div></div></div></div>")
              f.write("<div class='wrapper' id='main-wrapper' style='display:none;'><div class='sidebar-nav' id='main-lnb'><h3 id='idx-t' style='font-size: 1em; border-bottom: 2px solid; padding-bottom: 10px; margin-bottom:15px;'>📜 INDEX</h3><div id='l-ferry'>" + sidebar_ferry + "</div><div id='l-vault' style='display:none;'>" + sidebar_vault + "</div></div>")
              f.write("<div class='main-area' style='flex:1;'><div id='main-content-ui'><div style='border-bottom: 2px solid rgba(255,255,255,0.1); margin-bottom: 30px; padding-bottom: 20px; min-height: 100px; display: flex; align-items: center;'><span id='title-ferry' style='font-weight: 900; color: #ffffff; font-size: 3.5em;'>Tullius's Ferry</span><span id='title-vault' style='font-weight: 900; color: #FFB000; font-size: 3em; display: none;'>Vault 404-Vault boy's Outpost</span></div>")
              f.write("<input type='text' id='search-bar' placeholder='파일 검색...' onkeyup='globalSearch()'><div id='a-ferry'>" + main_ferry + "</div><div id='a-vault' style='display:none;'>" + main_vault + "</div></div></div></div>")
              f.write("<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script><script>")
              f.write("function openModal(){ document.getElementById('guideModal').style.display='block'; } function closeModal(){ document.getElementById('guideModal').style.display='none'; }")
              f.write("function updateParticles(m){ if(window.pJSDom && window.pJSDom.length){ window.pJSDom[0].pJS.fn.vendors.destroypJS(); window.pJSDom=[]; }")
              f.write("let c = m==='ferry' ? {particles:{number:{value:40},color:{value:'#ffffff'},shape:{type:'circle'},opacity:{value:0.3,random:true},size:{value:20,random:true},line_linked:{enable:false},move:{enable:true,speed:0.5,direction:'top',random:true,out_mode:'out'}}} : {particles:{number:{value:50},color:{value:['#FFB000','#888888','#4b3c2a']},shape:{type:'circle'},opacity:{value:0.4,random:true},size:{value:15,random:true},line_linked:{enable:false},move:{enable:true,speed:0.8,direction:'top',random:true,out_mode:'out'}}};")
              f.write("particlesJS('particles-js', c); }")
              f.write("function triggerTheme(m){ document.getElementById('welcome-screen').style.display='none'; document.getElementById('main-wrapper').style.display='flex'; document.body.style.opacity = '0'; setTimeout(() => { switchTheme(m); updateParticles(m); document.getElementById('main-lnb').classList.add('active'); document.body.style.opacity = '1'; }, 300); }")
              f.write("function switchTheme(m){ const b=document.body; const lF=document.getElementById('l-ferry'); const lV=document.getElementById('l-vault'); const btnF=document.getElementById('btn-f'); const btnV=document.getElementById('btn-v'); const h=document.getElementById('top-header'); const lnb=document.getElementById('main-lnb'); const idxT=document.getElementById('idx-t'); const mc=document.getElementById('modal-c'); const mt=document.getElementById('modal-t'); if(m==='ferry'){ b.className='theme-ferry'; document.getElementById('title-ferry').style.display='block'; document.getElementById('title-vault').style.display='none'; lV.style.display='none'; lF.style.display='block'; btnF.style.background='#ffffff'; btnF.style.color='#000'; btnV.style.background='transparent'; btnV.style.color='#FFB000'; h.style.borderColor='#ffffff'; lnb.style.borderColor='#ffffff'; idxT.style.color='#ffffff'; idxT.style.borderColor='#ffffff'; mc.style.borderColor='#ffffff'; mt.style.color='#ffffff'; document.getElementById('a-ferry').style.display='block'; document.getElementById('a-vault').style.display='none'; } else { b.className='theme-vault'; document.getElementById('title-ferry').style.display='none'; document.getElementById('title-vault').style.display='block'; lF.style.display='none'; lV.style.display='block'; btnV.style.background='#FFB000'; btnV.style.color='#000'; btnF.style.background='transparent'; btnF.style.color='#ffffff'; h.style.borderColor='#FFB000'; lnb.style.borderColor='#FFB000'; idxT.style.color='#FFB000'; idxT.style.borderColor='#FFB000'; mc.style.borderColor='#FFB000'; mt.style.color='#FFB000'; document.getElementById('a-ferry').style.display='none'; document.getElementById('a-vault').style.display='block'; } }")
              f.write("function showCat(fid){ document.querySelectorAll('.cat-content').forEach(c=>c.style.display='none'); document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active')); document.getElementById(fid).style.display='block'; document.getElementById('l-'+fid).classList.add('active'); window.scrollTo({top:0,behavior:'smooth'}); }")
              f.write("function globalSearch(){ let q=document.getElementById('search-bar').value.toLowerCase(); document.querySelectorAll('.cat-content').forEach(cat=>{ let files=cat.querySelectorAll('.file-link'); let has=false; files.forEach(f=>{ let t=f.innerText.toLowerCase(); if(q===''||t.includes(q)){ f.parentElement.style.display='block'; has=true; } else f.parentElement.style.display='none'; }); cat.style.display=(q===''?'none':(has?'block':'none')); }); }")
              f.write("</script></body></html>")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Fix: Variable NameError and Apply Final Theme Aesthetics" || exit 0
          git push origin main
