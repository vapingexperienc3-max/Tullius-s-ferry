name: Generate Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate nested index.html
        run: |
          python <<'EOF'
          import os
          import urllib.parse

          def inject_width_style(filepath):
              style_code = """<style>body, .fr-view, #content, .main-container, .article-content, div[class*="content"] { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 10px !important; } img { max-width: 100% !important; height: auto !important; }</style>"""
              try:
                  with open(filepath, 'r', encoding='utf-8') as f_in:
                      content = f_in.read()
                  for nick in ["Ryl3", "ryl3", "RYL3"]: content = content.replace(nick, "")
                  if '<head>' in content: content = content.replace('<head>', '<head>' + style_code)
                  with open(filepath, 'w', encoding='utf-8') as f_out: f_out.write(content)
              except: pass

          sidebar_ferry_modpack, sidebar_ferry_normal = "", ""
          sidebar_vault_modpack, sidebar_vault_normal = "", ""
          main_ferry, main_vault = "", ""
          
          bg_skyrim = "skyrim.png"
          bg_vault = "fallout.png"
          
          for root, dirs, files in sorted(os.walk('.')):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
              if html_files:
                  rel_path = os.path.relpath(root, '.')
                  display_name = "MAIN ARCHIVE" if rel_path == "." else rel_path.upper()
                  fid = "f-" + rel_path.replace(os.sep, '-')
                  is_vault = any(kw in display_name for kw in ["VAULT", "FALLOUT", "폴아웃"])
                  
                  icon = "https://img.icons8.com/color/48/vault-boy.png" if is_vault else "https://img.icons8.com/ios-filled/50/ffffff/skyrim.png"
                  link_html = f"<a href='javascript:void(0)' onclick='showCat(\"{fid}\")' class='sidebar-link' id='l-{fid}'>- {display_name}</a>"
                  
                  content_html = f"<div id='{fid}' class='cat-content' style='display:none;'>"
                  content_html += f"<details open class='folder-details' style='margin-bottom: 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 4px; overflow: hidden;'>"
                  content_html += f"<summary style='padding: 15px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor:pointer;'><span><img src='{icon}' style='width:18px; margin-right:10px;'>{display_name}</span><span style='font-size: 0.8em; color: #888;'>[{len(html_files)} FILES]</span></summary>"
                  content_html += "<ul style='margin: 0; padding: 15px 40px; list-style-type: square;'>"
                  for f_name in sorted(html_files):
                      path = os.path.join(root, f_name)
                      inject_width_style(path)
                      url = os.path.relpath(path, '.').replace(os.sep, '/')
                      disp = f_name.replace('.html', '').split(' (')[0].replace(' - 툴리우스 채널', '')
                      link_color = "#00ff42" if is_vault else "#ffce54"
                      content_html += f'<li style="margin: 10px 0;"><a href="{url}" target="_blank" class="file-link" style="color: {link_color}; text-decoration: none; font-weight: 500;">{disp}</a></li>'
                  content_html += "</ul></details></div>"

                  if "[모드팩]" in display_name:
                      if is_vault: sidebar_vault_modpack += link_html
                      else: sidebar_ferry_modpack += link_html
                  else:
                      if is_vault: sidebar_vault_normal += link_html
                      else: sidebar_ferry_normal += link_html
                  
                  if is_vault: main_vault += content_html
                  else: main_ferry += content_html

          def wrap_modpack(content, color):
              if not content: return ""
              return f"<details class='group-details' open style='margin-bottom:15px;'><summary style='color:{color}; font-weight:bold; cursor:pointer; padding:5px 0; border-bottom:1px dashed {color}66; margin-bottom:10px;'>[📦 모드팩 아카이브]</summary><div style='padding-left:10px;'>{content}</div></details>"

          sidebar_ferry = wrap_modpack(sidebar_ferry_modpack, "#ffce54") + sidebar_ferry_normal
          sidebar_vault = wrap_modpack(sidebar_vault_modpack, "#00ff42") + sidebar_vault_normal

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius Archive</title><style>")
              f.write("body { margin: 0; min-height: 100vh; background-color: #000; background-attachment: fixed; background-repeat: no-repeat; transition: background-color 0.5s; font-family: sans-serif; color: #eee; overflow-x: hidden; }")
              f.write(".theme-ferry { background-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.2) 100%), url('" + bg_skyrim + "'); background-size: 90% !important; background-position: right -150px top 20% !important; }")
              f.write(".theme-vault { background-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.2) 100%), url('" + bg_vault + "'); background-size: cover !important; background-position: calc(100% + 280px) center !important; }")
              
              f.write(".top-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 2px solid; transition: border-color 0.3s; }")
              f.write(".header-container { width: 100%; max-width: 1300px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }")
              f.write(".header-left { display: flex; gap: 15px; }")
              f.write(".header-right { display: flex; gap: 10px; }")
              f.write(".header-btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 0.9em; transition: 0.3s; border: 1px solid; background: transparent; }")
              
              f.write(".wrapper { display: flex; width: 100%; max-width: 1300px; padding: 110px 40px 40px; gap: 40px; margin: 0 auto; position: relative; z-index: 10; }")
              f.write(".sidebar-nav { width: 300px; position: sticky; top: 110px; height: calc(100vh - 150px); background: rgba(0,0,0,0.8); border: 1px solid; border-radius: 8px; padding: 25px; backdrop-filter: blur(10px); overflow-y: auto; }")
              f.write(".sidebar-link { display: block; color: #999; text-decoration: none !important; padding: 10px 0; font-size: 0.95em; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03); }")
              f.write(".sidebar-link:last-child { border-bottom: none; }")
              
              f.write(".theme-ferry .top-header { border-color: #ffce54; } .theme-vault .top-header { border-color: #00ff42; }")
              f.write(".theme-ferry .sidebar-nav { border-color: rgba(255,206,84,0.3); } .theme-vault .sidebar-nav { border-color: rgba(0,255,66,0.3); }")
              f.write(".theme-ferry .sidebar-link:hover, .theme-ferry .sidebar-link.active { color: #ffce54 !important; background: rgba(255,206,84,0.05); padding-left: 5px; }")
              f.write(".theme-vault .sidebar-link:hover, .theme-vault .sidebar-link.active { color: #00ff42 !important; background: rgba(0,255,66,0.05); padding-left: 5px; }")
              
              f.write(".main-area { flex: 1; min-width: 0; }")
              f.write("#search-bar { width: 100%; padding: 15px 25px; margin-bottom: 25px; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; color: #fff; outline: none; font-size: 1em; transition: 0.3s; }")
              f.write("#search-bar:focus { border-color: inherit; background: rgba(255, 255, 255, 0.12); }")
              
              f.write(".modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }")
              f.write(".modal-content { background: #0f1217; margin: 8% auto; padding: 40px; border: 1px solid; border-radius: 15px; width: 85%; max-width: 750px; position: relative; max-height: 75vh; overflow-y: auto; box-shadow: 0 0 40px rgba(0,0,0,0.5); }")
              f.write(".close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; cursor: pointer; color: #666; transition: 0.2s; }")
              f.write(".close-btn:hover { color: #fff; }")
              f.write("</style></head>")
          
              f.write("<div id='particles-js' style='position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;'></div>")
              
              f.write("<header class='top-header'><div class='header-container'><div class='header-left'>")
              f.write("<button class='header-btn' id='btn-f' onclick='switchTheme(\"ferry\")'>🚣 Ferry (Skyrim)</button>")
              f.write("<button class='header-btn' id='btn-v' onclick='switchTheme(\"vault\")'>☢️ Vault 404 (Fallout)</button></div>")
              f.write("<div class='header-right'>")
              f.write("<button class='header-btn' id='btn-g' onclick='openModal()' style='border-color: #555; color: #ccc;'>📖 가이드/후기</button>")
              repo_path = os.environ.get('GITHUB_REPOSITORY', 'vapingexperienc3-max/Tullius-s-ferry')
              f.write("<a href='https://github.com/" + repo_path + "/issues' target='_blank' class='header-btn' style='border-color:#3a86ff; color:#3a86ff;'>📢 에러제보</a></div></div></header>")

              f.write("<div id='guideModal' class='modal'><div class='modal-content'><span class='close-btn' onclick='closeModal()'>&times;</span><h3 id='modal-t' style='margin-top:0; font-size: 1.6em;'>📜 가이드 및 후기 확인</h3><div style='font-size: 1em; color: #ddd; line-height: 1.8; margin-top: 20px;'>")
              f.write("<p style='background: rgba(255,255,255,0.03); padding: 20px; border-radius: 8px;'><strong>💡 이용 팁:</strong><br>- 대부분의 파일은 HTML 양식으로 백업되어 있습니다. <strong>(기술적 한계로 영상은 출력되지 않습니다.)</strong><br>- <strong>질문, 피드백, 로그</strong>의 경우 일일히 버전이나 문제 유형을 구분하기 어려워 <strong>폴더 하나에 구분없이 넣었습니다.</strong> 양해 바랍니다.<br>- <strong>미해결 탭</strong>의 경우 해결되지 않았다고 생각되는 이슈들을 백업해 놓았습니다. <strong>해결된 문제가 있으면 피드백 부탁드립니다.</strong><br>- 자잘한 픽스나 번역은 원본 대신 HTML 링크로 백업되었으며, <strong>외부 링크(구드/메가)가 터지는 경우는 대처가 어렵습니다.</strong><br>- <strong>모드팩, 프리셋, 의상, 동료</strong> 등 주요 자료는 테라박스에 원본으로 백업되어 있습니다. <span class='highlight-text' style='font-weight: bold;'>(파일 암호 필수 확인)</span></p>")
              f.write("<p style='font-size: 0.9em; color: #888;'>* 백업 관련 피드백은 좌측 상단의 제보 버튼(깃허브 로그인 필요)이나 아카라이브(코네) 피드백 글에 댓글 부탁드립니다.</p>")
              f.write("<div style='border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px; margin-top: 25px;'><strong>✍️ 후기:</strong><br><p style='font-style: italic; color: #bbb;'>공장장 이 개같은 년, 너 아니었음 이거 시작도 안 했어 알아? 알면 소븐가드에서 우릴 위해 술잔이나 들어달라고. <br><br>툴붕이들은 아프지 말고. 너네 없어지면 15년 동안 후속작 유기하는 토드 새끼 누가 욕해주냐?</p></div></div></div></div>")

              f.write("<div class='wrapper'><div class='sidebar-nav'><h3 id='idx-t' style='font-size: 1em; border-bottom: 2px solid; padding-bottom: 10px; margin-bottom:15px; letter-spacing: 1px;'>📜 INDEX</h3>")
              f.write("<div id='l-ferry'>" + sidebar_ferry + "</div><div id='l-vault' style='display:none;'>" + sidebar_vault + "</div></div>")
              f.write("<div class='main-area'><div style='border-bottom: 2px solid rgba(255,255,255,0.1); margin-bottom: 30px; padding-bottom: 20px; min-height: 100px; display: flex; align-items: center;'>")
              f.write("<span id='title-ferry' style='font-weight: 900; color: #ffffff; font-size: 3.5em; display: none; text-shadow: 2px 2px 15px rgba(0,0,0,0.8);'>Tullius's Ferry</span>")
              f.write("<span id='title-vault' style='font-weight: 900; color: #00ff42; font-size: 3em; display: none; text-shadow: 2px 2px 15px rgba(0,0,0,0.8);'>Vault 404</span></div>")
              f.write("<input type='text' id='search-bar' placeholder='파일 이름이나 카테고리 검색...' onkeyup='globalSearch()'>")
              f.write("<div id='a-ferry'>" + main_ferry + "</div><div id='a-vault' style='display:none;'>" + main_vault + "</div></div></div>")
          
              f.write("<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script><script>")
              f.write("function openModal(){ document.getElementById('guideModal').style.display='block'; }")
              f.write("function closeModal(){ document.getElementById('guideModal').style.display='none'; }")
              f.write("window.onclick=(e)=>{ if(e.target==document.getElementById('guideModal')) closeModal(); };")
              
              f.write("function updateParticles(m){ const oldCtx = document.getElementById('particles-js'); if (oldCtx) { oldCtx.remove(); } const newCtx = document.createElement('div'); newCtx.id = 'particles-js'; newCtx.style = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;'; document.body.prepend(newCtx); let conf; if(m==='ferry'){ conf = {particles:{number:{value:60},color:{value:'#ffffff'},shape:{type:'circle'},opacity:{value:0.5},size:{value:3},line_linked:{enable:false},move:{enable:true,speed:1.0,direction:'bottom',random:true,out_mode:'out'}}}; } else { conf = {particles:{number:{value:100},color:{value:['#39FF14', '#1a1a1a']},shape:{type:'circle'},opacity:{value:0.6},size:{value:2},line_linked:{enable:false},move:{enable:true,speed:0.8,direction:'top',random:true,out_mode:'out'}}}; } if(typeof particlesJS !== 'undefined') { particlesJS('particles-js', conf); } }")
              
              f.write("function switchTheme(m){ updateParticles(m); const b=document.body; const tF=document.getElementById('title-ferry'); const tV=document.getElementById('title-vault'); const modalT=document.getElementById('modal-t'); const hl=document.querySelectorAll('.highlight-text'); const btnF=document.getElementById('btn-f'); const btnV=document.getElementById('btn-v'); const mContent=document.querySelector('.modal-content'); if(m==='ferry'){ b.className='theme-ferry'; tF.style.display='block'; tV.style.display='none'; modalT.style.color='#ffce54'; mContent.style.borderColor='#ffce54'; btnF.style.background='#ffce54'; btnF.style.color='#000'; btnF.style.borderColor='#ffce54'; btnV.style.background='transparent'; btnV.style.color='#00ff42'; btnV.style.borderColor='#00ff42'; hl.forEach(e=>e.style.color='#ffce54'); document.getElementById('l-ferry').style.display='block'; document.getElementById('l-vault').style.display='none'; document.getElementById('a-ferry').style.display='block'; document.getElementById('a-vault').style.display='none'; document.getElementById('idx-t').style.color='#ffce54'; document.getElementById('idx-t').style.borderColor='#ffce54'; } else { b.className='theme-vault'; tF.style.display='none'; tV.style.display='block'; modalT.style.color='#00ff42'; mContent.style.borderColor='#00ff42'; btnV.style.background='#00ff42'; btnV.style.color='#000'; btnV.style.borderColor='#00ff42'; btnF.style.background='transparent'; btnF.style.color='#ffce54'; btnF.style.borderColor='#ffce54'; hl.forEach(e=>e.style.color='#00ff42'); document.getElementById('l-ferry').style.display='none'; document.getElementById('l-vault').style.display='block'; document.getElementById('a-ferry').style.display='none'; document.getElementById('a-vault').style.display='block'; document.getElementById('idx-t').style.color='#00ff42'; document.getElementById('idx-t').style.borderColor='#00ff42'; } }")
              
              f.write("function showCat(fid){ document.querySelectorAll('.cat-content').forEach(c => c.style.display = 'none'); document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active')); const target = document.getElementById(fid); if(target) target.style.display = 'block'; const link = document.getElementById('l-' + fid); if(link) link.classList.add('active'); window.scrollTo({top: 0, behavior: 'smooth'}); }")
              
              f.write("function globalSearch(){ let q = document.getElementById('search-bar').value.toLowerCase(); let allCats = document.querySelectorAll('.cat-content'); allCats.forEach(cat => { let files = cat.querySelectorAll('.file-link'); let hasVisibleFile = false; files.forEach(f_link => { let txt = f_link.innerText.toLowerCase(); if (q === '' || txt.includes(q)) { f_link.parentElement.style.display = 'block'; hasVisibleFile = true; } else { f_link.parentElement.style.display = 'none'; } }); if (q === '') { cat.style.display = 'none'; } else { cat.style.display = hasVisibleFile ? 'block' : 'none'; } }); if (q === '') { const activeLink = document.querySelector('.sidebar-link.active'); if(activeLink) { const fid = activeLink.id.replace('l-', ''); const target = document.getElementById(fid); if(target) target.style.display = 'block'; } } }")
              
              f.write("window.onload=()=>{ switchTheme('ferry'); };")
              f.write("</script></body></html>")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "100% Feedback Applied: Perfect Layout & Header" || exit 0
          git push origin main
