name: Generate Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate nested index.html
        run: |
          python <<'EOF'
          import os

          # [중략: 파일 처리 로직 - 백업 4번의 로직 유지]
          # ... (생략) ...

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius Archive</title><style>")
              # 기본 애니메이션 및 레이아웃
              f.write("body { margin: 0; min-height: 100vh; background-color: #000; background-attachment: fixed; background-repeat: no-repeat; transition: opacity 0.4s ease-in-out; font-family: sans-serif; color: #eee; overflow-x: hidden; }")
              f.write(".theme-ferry { background-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.2) 100%), url('skyrim.png'); background-size: 90% !important; background-position: right -150px top 20% !important; }")
              f.write(".theme-vault { background-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.2) 100%), url('fallout.png'); background-size: cover !important; background-position: center !important; }")
              
              # 인덱스 강조 효과 (백업 4번 핵심 복구)
              f.write(".sidebar-nav { width: 300px; min-width: 300px; position: sticky; top: 110px; height: fit-content; background: rgba(0,0,0,0.85); border: 1px solid; border-radius: 8px; padding: 25px; box-sizing: border-box; transition: border-color 0.3s; }")
              f.write(".sidebar-link { display: block; color: #888; text-decoration: none !important; padding: 10px 0; font-size: 0.95em; transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.03); }")
              
              # 스카이림(금빛) vs 폴아웃(초록색) 하이라이트 분리
              f.write(".theme-ferry .sidebar-link:hover, .theme-ferry .sidebar-link.active { color: #ffce54 !important; text-shadow: 0 0 10px #ffce54; font-weight: bold; }")
              f.write(".theme-vault .sidebar-link:hover, .theme-vault .sidebar-link.active { color: #00ff42 !important; text-shadow: 0 0 10px #00ff42; font-weight: bold; }")
              
              # 버튼 및 기타 UI
              f.write(".header-btn { padding: 0 18px; height: 40px; border-radius: 6px; font-weight: bold; cursor: pointer; border: 1px solid; background: transparent; color: #fff; transition: 0.3s; font-size: 0.9em; display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; text-decoration: none; }")
              f.write("</style></head><body>")
              
              # 가이드 원문 (피드백 문구 포함 100% 복구)
              f.write("<div id='guideModal' class='modal'><div class='modal-content' id='modal-c'><span class='close-btn' onclick='closeModal()'>&times;</span><h3 id='modal-t' style='margin-top:0;'>📜 가이드 및 후기</h3><div style='color:#ddd; line-height:1.8;'>")
              f.write("<p style='background:rgba(255,255,255,0.03); padding:20px; border-radius:8px;'><strong>💡 이용 팁:</strong><br>")
              f.write("- 대부분의 파일은 HTML 양식으로 백업되어 있습니다. <strong>(기술적 한계로 영상은 출력되지 않습니다.)</strong><br>")
              f.write("- <strong>질문, 피드백, 로그</strong>의 경우 일일히 버전이나 문제 유형을 구분하기 어려워 <strong>폴더 하나에 구분없이 넣었습니다.</strong> 양해 바랍니다.<br>")
              f.write("- <strong>미해결 탭</strong>의 경우 해결되지 않았다고 생각되는 이슈들을 백업해 놓았습니다. <strong>해결된 문제가 있으면 피드백 부탁드립니다.</strong><br>")
              f.write("- 자잘한 픽스나 번역은 원본 대신 HTML 링크로 백업되었으며, <strong>외부 링크(구드/메가)가 터지는 경우는 대처가 어렵습니다.</strong><br>")
              f.write("- <strong>모드팩, 프리셋, 의상, 동료</strong> 등 주요 자료는 테라박스에 원본으로 백업되어 있습니다. <span class='highlight-text' style='font-weight: bold;'>(파일 암호 필수 확인)</span></p>")
              f.write("<p><span class='highlight-text' style='font-weight: bold;'>* 백업 관련 피드백은 좌측 상단의 제보 버튼(깃허브 로그인 필요)이나 아카라이브(코네) 피드백 글에 댓글 부탁드립니다.</span></p>")
              f.write("<div style='border-top:1px solid rgba(255,255,255,0.15); padding-top:15px; margin-top:15px;'><strong>✍️ 후기:</strong><br>")
              f.write("공장장 이 개같은 년, 너 아니었음 이거 시작도 안 했어 알아? 알면 소븐가드에서 우릴 위해 술잔이나 들어달라고. <br>")
              f.write("툴붕이들은 아프지 말고. 너네 없어지면 15년 동안 후속작 유기하는 토드 새끼 누가 욕해주냐?</div></div></div></div>")

              # [중략: 파티클 및 테마 전환 스크립트]
              # ... (중략) ...
          EOF
