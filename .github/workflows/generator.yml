name: Generate Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate nested index.html
        run: |
          python <<'EOF'
          import os

          def inject_width_style(filepath):
              style_code = """<style>body, .fr-view, #content, .main-container, .article-content, div[class*="content"] { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 10px !important; } img { max-width: 100% !important; height: auto !important; }</style>"""
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  for nick in ["Ryl3", "ryl3", "RYL3"]: content = content.replace(nick, "")
                  if '<head>' in content: content = content.replace('<head>', '<head>' + style_code)
                  with open(filepath, 'w', encoding='utf-8') as f: f.write(content)
              except: pass

          # 🚀 [수정] 모든 변수 초기화 선언 (NameError 방지)
          sidebar_ferry_modpack, sidebar_ferry_normal = "", ""
          sidebar_vault_modpack, sidebar_vault_normal = "", ""
          main_ferry, main_vault = "", ""
          
          for root, dirs, files in sorted(os.walk('.')):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
              if html_files:
                  rel_path = os.path.relpath(root, '.')
                  display_name = "MAIN ARCHIVE" if rel_path == "." else rel_path.upper()
                  fid = "f-" + rel_path.replace(os.sep, '-')
                  is_vault = any(kw in display_name for kw in ["VAULT", "FALLOUT", "폴아웃"])
                  
                  icon = "https://img.icons8.com/color/48/vault-boy.png" if is_vault else "https://img.icons8.com/ios-filled/50/ffffff/skyrim.png"
                  link_html = f"<a href='javascript:void(0)' onclick='showCat(\"{fid}\")' class='sidebar-link' id='l-{fid}'>- {display_name}</a>"
                  
                  content_html = f"<div id='{fid}' class='cat-content' style='display:none;'><details open class='folder-details' style='margin-bottom:15px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;'>"
                  content_html += f"<summary style='padding:15px; font-weight:bold; color:#fff; display:flex; align-items:center; justify-content:space-between; cursor:pointer;'><span><img src='{icon}' style='width:18px; margin-right:10px;'>{display_name}</span></summary><ul style='margin:0; padding:15px 40px; list-style-type:square;'>"
                  for f_name in sorted(html_files):
                      path = os.path.join(root, f_name)
                      inject_width_style(path)
                      url = os.path.relpath(path, '.').replace(os.sep, '/')
                      disp = f_name.replace('.html', '').split(' (')[0].replace(' - 툴리우스 채널', '')
                      link_color = "#FFB000" if is_vault else "#ffffff"
                      content_html += f'<li style="margin:10px 0;"><a href="{url}" target="_blank" class="file-link" style="color:{link_color}; text-decoration:none; font-weight:500;">{disp}</a></li>'
                  content_html += "</ul></details></div>"

                  if "[모드팩]" in display_name:
                      if is_vault: sidebar_vault_modpack += link_html
                      else: sidebar_ferry_modpack += link_html
                  else:
                      if is_vault: sidebar_vault_normal += link_html
                      else: sidebar_ferry_normal += link_html
                  if is_vault: main_vault += content_html
                  else: main_ferry += content_html

          sidebar_ferry = f"<details class='group-details' open><summary style='color:#ffffff; font-weight:bold; cursor:pointer; padding:5px 0; border-bottom:1px dashed #ffffff66; margin-bottom:10px;'>[📦 모드팩 아카이브]</summary><div style='padding-left:10px;'>{sidebar_ferry_modpack}</div></details>" + sidebar_ferry_normal
          sidebar_vault = f"<details class='group-details' open><summary style='color:#FFB000; font-weight:bold; cursor:pointer; padding:5px 0; border-bottom:1px dashed #FFB00066; margin-bottom:10px;'>[📦 모드팩 아카이브]</summary><div style='padding-left:10px;'>{sidebar_vault_modpack}</div></details>" + sidebar_vault_normal

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius Archive</title><style>")
              f.write("body { margin: 0; min-height: 100vh; background-color: #000; transition: opacity 0.4s; font-family: sans-serif; color: #eee; overflow-x: hidden; }")
              
              # 🖼️ [레이아웃] 배경 이미지 짤림 방지 및 텍스트 하단 배치
              f.write(".theme-ferry { background-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.3) 50%), url('skyrim.png'); background-size: contain !important; background-position: center bottom !important; background-attachment: fixed; }")
              f.write(".theme-vault { background-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.3) 50%), url('fallout2.jpg'); background-size: contain !important; background-position: center bottom !important; background-attachment: fixed; }")
              
              f.write(".top-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 2px solid rgba(255,255,255,0.1); }")
              f.write(".sidebar-nav { width: 300px; position: fixed; top: 110px; left: 40px; height: calc(100vh - 150px); background: rgba(0,0,0,0.8); border: 1px solid; border-radius: 8px; padding: 25px; overflow-y: auto; z-index: 100; transition: 0.3s; opacity: 0; visibility: hidden; }")
              f.write(".sidebar-nav.active { opacity: 1; visibility: visible; }")
              f.write(".main-area { margin-left: 380px; padding-top: 100px; padding-right: 50px; position: relative; z-index: 10; }")
              f.write(".title-text { font-weight: 900; text-shadow: 0 0 20px rgba(0,0,0,1); margin-bottom: 30px; display: block; }")
              f.write(".welcome-screen { position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: #000; }")
              f.write(".welcome-img { max-width: 600px; width: 80%; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }")
              f.write(".sidebar-link { display: block; color: #888; text-decoration: none !important; padding: 10px 0; font-size: 0.95em; transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.03); }")
              f.write(".theme-ferry .sidebar-link:hover, .theme-ferry .sidebar-link.active { color: #ffffff !important; text-shadow: 0 0 12px #ffffff; font-weight: bold; }")
              f.write(".theme-vault .sidebar-link:hover, .theme-vault .sidebar-link.active { color: #FFB000 !important; text-shadow: 0 0 12px #FFB000; font-weight: bold; }")
              f.write("</style></head><body>")
              
              f.write("<div id='particles-js' style='position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;'></div>")
              
              # 🖼️ [수정] 웰컴 스크린 이미지 출력 보장
              f.write("<div id='welcome-screen' class='welcome-screen'><img src='welcome page.jpg' class='welcome-img' onerror='this.src=\"https://via.placeholder.com/600x400?text=Welcome+Tullius+Archive\"'><h1 style='font-size: 2.2em; color: #fff;'>환영합니다, 드래곤본과 생존자 여러분</h1><p style='color: #888; font-weight:bold;'>상단의 테마 버튼을 눌러 아카이브를 소환하십시오.</p></div>")

              f.write("<header class='top-header'><div style='width: 100%; max-width: 1300px; display: flex; justify-content: space-between; padding: 0 40px;'>")
              f.write("<div><button class='header-btn' onclick='triggerTheme(\"ferry\")' id='btn-f' style='border:1px solid #fff; color:#fff; background:transparent; padding:8px 15px; cursor:pointer; border-radius:4px;'>🚣 Ferry (Skyrim)</button>")
              f.write("<button class='header-btn' onclick='triggerTheme(\"vault\")' id='btn-v' style='border:1px solid #FFB000; color:#FFB000; background:transparent; padding:8px 15px; cursor:pointer; border-radius:4px; margin-left:10px;'>☢️ Vault 404</button></div>")
              f.write("</div></header>")

              f.write("<div class='wrapper' id='main-wrapper' style='display:none;'><div class='sidebar-nav' id='main-lnb'><h3 id='idx-t' style='border-bottom: 2px solid; padding-bottom: 10px;'>📜 INDEX</h3><div id='l-ferry'>" + sidebar_ferry + "</div><div id='l-vault' style='display:none;'>" + sidebar_vault + "</div></div>")
              f.write("<div class='main-area'>")
              f.write("<span id='title-ferry' class='title-text' style='color:#fff; font-size:4em; display:none;'>Tullius's Ferry</span>")
              f.write("<span id='title-vault' class='title-text' style='color:#FFB000; font-size:3.5em; display:none;'>Vault 404: Outpost</span>")
              f.write("<input type='text' id='search-bar' placeholder='파일 검색...' style='width:100%; padding:12px; border-radius:20px; border:1px solid #444; background:rgba(255,255,255,0.05); color:#fff; margin:20px 0;'>")
              f.write("<div id='a-ferry'>" + main_ferry + "</div><div id='a-vault' style='display:none;'>" + main_vault + "</div></div></div>")

              f.write("<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script><script>")
              
              # ☁️ [수정] 비눗방울 제거 -> 흐릿한 안개/먼지 질감 (Size 대폭 확장)
              f.write("function updateParticles(m){ if(window.pJSDom && window.pJSDom.length){ window.pJSDom[0].pJS.fn.vendors.destroypJS(); window.pJSDom=[]; }")
              f.write("let c = m==='ferry' ? ")
              f.write("{particles:{number:{value:20},color:{value:'#ffffff'},opacity:{value:0.1,random:true},size:{value:150,random:true},move:{enable:true,speed:0.4,direction:'top',random:true,out_mode:'out'}}} : ")
              f.write("{particles:{number:{value:35},color:{value:['#FFB000','#555555']},opacity:{value:0.15,random:true},size:{value:100,random:true},move:{enable:true,speed:0.6,direction:'top',random:true,out_mode:'out'}}};")
              f.write("particlesJS('particles-js', c); }")
              
              f.write("function triggerTheme(m){ document.getElementById('welcome-screen').style.display='none'; document.getElementById('main-wrapper').style.display='flex'; switchTheme(m); updateParticles(m); document.getElementById('main-lnb').classList.add('active'); }")
              f.write("function switchTheme(m){ const lF=document.getElementById('l-ferry'); const lV=document.getElementById('l-vault'); const tF=document.getElementById('title-ferry'); const tV=document.getElementById('title-vault'); const aF=document.getElementById('a-ferry'); const aV=document.getElementById('a-vault'); const lnb=document.getElementById('main-lnb'); const idx=document.getElementById('idx-t'); if(m==='ferry'){ document.body.className='theme-ferry'; lF.style.display='block'; lV.style.display='none'; tF.style.display='block'; tV.style.display='none'; aF.style.display='block'; aV.style.display='none'; lnb.style.borderColor='#fff'; idx.style.color='#fff'; idx.style.borderColor='#fff'; } else { document.body.className='theme-vault'; lF.style.display='none'; lV.style.display='block'; tF.style.display='none'; tV.style.display='block'; aF.style.display='none'; aV.style.display='block'; lnb.style.borderColor='#FFB000'; idx.style.color='#FFB000'; idx.style.borderColor='#FFB000'; } }")
              f.write("function showCat(fid){ document.querySelectorAll('.cat-content').forEach(c=>c.style.display='none'); document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active')); document.getElementById(fid).style.display='block'; document.getElementById('l-'+fid).classList.add('active'); window.scrollTo({top:0,behavior:'smooth'}); }")
              f.write("</script></body></html>")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Fix NameError and Refine Fog Particles" || exit 0
          git push origin main
