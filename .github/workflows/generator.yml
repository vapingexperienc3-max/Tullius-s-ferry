name: Generate Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate nested index.html
        run: |
          python <<'EOF'
          import os

          def inject_width_style(filepath):
              style_code = """<style>body, .fr-view, #content, .main-container, .article-content, div[class*="content"] { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 10px !important; } img { max-width: 100% !important; height: auto !important; }</style>"""
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  for nick in ["Ryl3", "ryl3", "RYL3"]: content = content.replace(nick, "")
                  if '<head>' in content: content = content.replace('<head>', '<head>' + style_code)
                  with open(filepath, 'w', encoding='utf-8') as f: f.write(content)
              except: pass

          sidebar_ferry, sidebar_vault = "", ""
          main_ferry, main_vault = "", ""
          
          # 파이썬 코드 상단
          bg_skyrim = "https://multiplayer.net-cdn.it/thumbs/images/2025/02/12/skyrim-3_lkz8srZ_cropped_0_9_1600_905_jpeg_1600x900_crop_q85.jpg"
          # 사펑 대신 폴아웃 4 공식 배경화면으로 교체
          bg_vault = "https://images.alphacoders.com/656/656111.jpg"
          
          for root, dirs, files in sorted(os.walk('.')):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
              if html_files:
                  rel_path = os.path.relpath(root, '.')
                  display_name = "MAIN ARCHIVE" if rel_path == "." else rel_path.upper()
                  fid = "f-" + rel_path.replace(os.sep, '-')
                  is_vault = any(kw in display_name for kw in ["VAULT", "FALLOUT", "폴아웃"])
                  icon = "https://img.icons8.com/color/48/vault-boy.png" if is_vault else "https://img.icons8.com/ios-filled/50/ffffff/skyrim.png"
                  link_html = f"<a href='javascript:void(0)' onclick='showCat(\"{fid}\")' class='sidebar-link' id='l-{fid}'>- {display_name}</a>"
                  content_html = f"<div id='{fid}' class='cat-content' style='display:none;'>"
                  content_html += f"<details open class='folder-details' style='margin-bottom: 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 4px; overflow: hidden;'>"
                  content_html += f"<summary style='padding: 15px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor:pointer;'><span><img src='{icon}' style='width:18px; margin-right:10px;'>{display_name}</span><span style='font-size: 0.8em; color: #888;'>[{len(html_files)} FILES]</span></summary>"
                  content_html += "<ul style='margin: 0; padding: 15px 40px; list-style-type: square;'>"
                  for f in sorted(html_files):
                      path = os.path.join(root, f)
                      inject_width_style(path)
                      url = os.path.relpath(path, '.').replace(os.sep, '/')
                      disp = f.replace('.html', '').split(' (')[0].replace(' - 툴리우스 채널', '')
                      link_color = "#00ff42" if is_vault else "#ffce54"
                      content_html += f'<li style="margin: 10px 0;"><a href="{url}" target="_blank" class="file-link" style="color: {link_color}; text-decoration: none; font-weight: 500;">{disp}</a></li>'
                  content_html += "</ul></details></div>"
                  if is_vault:
                      sidebar_vault += link_html
                      main_vault += content_html
                  else:
                      sidebar_ferry += link_html
                      main_ferry += content_html

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius Archive</title><style>")
              # 1. Body & Wrapper (도바킨 우측 고정 포함)
              f.write("body { margin: 0; min-height: 100vh; background-color: #000; background-attachment: fixed !important; background-size: cover !important; background-repeat: no-repeat !important; background-position: right center !important; transition: 0.5s; font-family: sans-serif; color: #eee; overflow-x: hidden; display: flex; justify-content: center; }")
              f.write(".wrapper { display: flex; width: 100%; max-width: 1200px; padding: 40px; gap: 40px; position: relative; z-index: 10; }")
              
              # 2. 사이드바 및 버튼
              f.write(".sidebar-nav { width: 280px; position: sticky; top: 40px; height: fit-content; background: rgba(0,0,0,0.85); border: 1px solid; border-radius: 8px; padding: 20px; backdrop-filter: blur(15px); transition: border-color 0.3s; }")
              f.write(".nav-btn { display: block; padding: 10px; text-align: center; border: 1px solid; border-radius: 4px; text-decoration: none !important; font-size: 0.85em; font-weight: bold; transition: 0.3s; margin-bottom: 8px; cursor: pointer; }")
              
              # 3. 인덱스 링크 및 호버 효과 (황금빛/녹색)
              f.write(".sidebar-link { display: block; color: #ccc; text-decoration: none !important; padding: 8px 0; font-size: 0.9em; transition: 0.3s; }")
              f.write(".theme-ferry .sidebar-link:hover, .theme-ferry .sidebar-link.active, .theme-ferry .file-link:hover { color: #ffce54 !important; text-shadow: 0 0 8px rgba(255,206,84,0.6); }")
              f.write(".theme-vault .sidebar-link:hover, .theme-vault .sidebar-link.active, .theme-vault .file-link:hover { color: #00ff42 !important; text-shadow: 0 0 8px rgba(0,255,66,0.6); }")
              
              # 4. 메인 영역 및 검색창
              f.write(".main-area { flex: 1; min-width: 0; }")
              f.write("#search-bar { width: 100%; padding: 12px 20px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; color: #fff; outline: none; }")
              f.write(".guide-details { background: rgba(0, 0, 0, 0.75); border: 1px solid; border-radius: 8px; padding: 25px; margin-bottom: 30px; backdrop-filter: blur(10px); }")
              
              # 5. 테마별 경계선 색상 강제 지정
              f.write(".theme-ferry .sidebar-nav, .theme-ferry .guide-details { border-color: rgba(255,206,84,0.4) !important; }")
              f.write(".theme-vault .sidebar-nav, .theme-vault .guide-details { border-color: rgba(0,255,66,0.4) !important; }")
              f.write(".theme-ferry .nav-btn.ferry-btn { background: #ffce54; color: #000; }")
              f.write(".theme-vault .nav-btn.vault-btn { background: #00ff42; color: #000; }")
              f.write("summary { cursor: pointer; outline: none; }</style></head>")
              f.write("<div id='particles-js' style='position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;'></div>")
              f.write("<div class='wrapper'><div class='sidebar-nav'><div style='display:flex; flex-direction:column; gap:8px; margin-bottom:12px;'><div class='nav-btn ferry-btn' onclick='switchTheme(\"ferry\")'>🚣 Ferry (Skyrim)</div><div class='nav-btn vault-btn' onclick='switchTheme(\"vault\")'>☢️ Vault 404 (Fallout)</div></div>")
              f.write(f"<a href='https://github.com/{os.environ.get('GITHUB_REPOSITORY')}/issues' target='_blank' class='nav-btn' style='border-color:#58a6ff; color:#58a6ff; margin-bottom:20px;'>📢 건의 및 에러 제보</a>")
              f.write("<h3 id='idx-t' style='font-size: 0.9em; border-bottom: 1px solid; padding-bottom: 5px; margin-bottom:10px;'>📜 INDEX</h3>")
              f.write(f"<div id='l-ferry'>{sidebar_ferry}</div><div id='l-vault' style='display:none;'>{sidebar_vault}</div></div>")
              
              f.write("<div class='main-area'><div style='border-bottom: 2px solid rgba(255,255,255,0.2); margin-bottom: 20px; padding-bottom: 15px; min-height: 80px; display: flex; align-items: center;'>")
              f.write("<span id='title-ferry' style='font-weight: 900; color: #ffffff; font-size: 3em; display: none; text-shadow: 2px 2px 10px #000;'>Tullius's Ferry</span>")
              f.write("<span id='title-vault' style='font-weight: 900; color: #00ff42; font-size: 2.6em; display: none; text-shadow: 2px 2px 10px #000;'>Vault 404-Vault boy's Outpost</span></div>")
              
              f.write("<p id='theme-quote' style='color: #bdc3c7; font-style: italic; margin-bottom: 15px;'></p><input type='text' id='search-bar' placeholder='파일 검색...' onkeyup='globalSearch()'>")
              
              # 가이드 문구 완벽 복구
              f.write("<details open class='guide-details'><summary><h3 id='guide-title' style='margin: 0; display: inline-block;'>[📜 가이드 및 후기 확인]</h3></summary>")
              f.write("<div style='font-size: 0.95em; color: #ddd; line-height: 1.8; margin-top: 15px;'>")
              f.write("<p><strong>💡 이용 팁:</strong><br>")
              f.write("- 대부분의 파일은 HTML 양식으로 백업되어 있습니다. <strong>(기술적 한계로 영상은 출력되지 않습니다.)</strong><br>")
              f.write("- <strong>질문, 피드백, 로그</strong>의 경우 일일히 버전이나 문제 유형을 구분하기 어려워 <strong>폴더 하나에 구분없이 넣었습니다.</strong> 양해 바랍니다.<br>")
              f.write("- <strong>미해결 탭</strong>의 경우 해결되지 않았다고 생각되는 이슈들을 백업해 놓았습니다. <strong>해결된 문제가 있으면 피드백 부탁드립니다.</strong><br>")
              f.write("- 자잘한 픽스나 번역은 원본 대신 HTML 링크로 백업되었으며, <strong>외부 링크(구드/메가)가 터지는 경우는 대처가 어렵습니다.</strong><br>")
              f.write("- <strong>모드팩, 프리셋, 의상, 동료</strong> 등 주요 자료는 테라박스에 원본으로 백업되어 있습니다. <span class='highlight-text' style='font-weight: bold;'>(파일 암호 필수 확인)</span></p>")
              f.write("<p><span class='highlight-text' style='font-weight: bold;'>* 백업 관련 피드백은 좌측 상단의 제보 버튼(깃허브 로그인 필요)이나 아카라이브(코네) 피드백 글에 댓글 부탁드립니다.</span></p>")
              f.write("<p style='border-top: 1px solid rgba(255,255,255,0.15); padding-top: 15px;'><strong>✍️ 후기:</strong><br>")
              f.write("공장장 이 개같은 년, 너 아니었음 이거 시작도 안 했어 알아? 알면 소븐가드에서 우릴 위해 술잔이나 들어달라고. <br>")
              f.write("툴붕이들은 아프지 말고. 너네 없어지면 15년 동안 후속작 유기하는 토드 새끼 누가 욕해주냐?</p></div></details>")
              
              f.write(f"<div id='a-ferry'>{main_ferry}</div><div id='a-vault' style='display:none;'>{main_vault}</div></div></div>")
              
              f.write("<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script><script>")
              
              # 1. 배경 변수 선언 (순수 URL만 담습니다)
              f.write(f"const bgImgF = '{bg_skyrim}';")
              f.write(f"const bgImgV = '{bg_vault}';")

              # 2. switchTheme 함수 (위치 강제 고정 버전)
              f.write("function switchTheme(m){ const b=document.body; const tF=document.getElementById('title-ferry'); const tV=document.getElementById('title-vault'); const gT=document.getElementById('guide-title'); const hl=document.querySelectorAll('.highlight-text');")
              
              # 배경 이미지 및 위치 설정 (right center !important 효과를 JS로 구현)
              f.write("let bgUrl = (m==='ferry') ? bgImgF : bgImgV;")
              f.write("b.style.backgroundImage = 'linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0) 100%), url(' + bgUrl + ')';")
              f.write("b.style.backgroundPosition = 'right center';")
              f.write("b.style.backgroundSize = 'cover';")
              f.write("b.style.backgroundAttachment = 'fixed';")
              
              # 테마별 UI 제어
              f.write("if(m==='ferry'){ b.className='theme-ferry'; tF.style.display='block'; tV.style.display='none'; gT.style.color='#ffce54'; hl.forEach(e=>e.style.color='#ffce54'); document.getElementById('l-ferry').style.display='block'; document.getElementById('l-vault').style.display='none'; document.getElementById('a-ferry').style.display='block'; document.getElementById('a-vault').style.display='none'; document.getElementById('idx-t').style.color='#ffce54'; }")
              f.write("else{ b.className='theme-vault'; tF.style.display='none'; tV.style.display='block'; gT.style.color='#00ff42'; hl.forEach(e=>e.style.color='#00ff42'); document.getElementById('l-ferry').style.display='none'; document.getElementById('l-vault').style.display='block'; document.getElementById('a-ferry').style.display='none'; document.getElementById('a-vault').style.display='block'; document.getElementById('idx-t').style.color='#00ff42'; }")
              f.write("updateParticles(m); }")
              
              # 3. 파티클 및 기타 함수 (기존과 동일하지만 중괄호 체크 완료)
              f.write("function updateParticles(m){ if(m==='ferry'){ window.particlesJS('particles-js',{'particles':{'number':{'value':50},'color':{'value':'#fff'},'shape':{'type':'circle'},'opacity':{'value':0.3},'size':{'value':3},'line_linked':{'enable':false},'move':{'enable':true,'speed':1.5,'direction':'bottom'}}}); }")
              f.write("else { window.particlesJS('particles-js',{'particles':{'number':{'value':80},'color':{'value':'#00ff42'},'shape':{'type':'circle'},'opacity':{'value':0.4},'size':{'value':2},'line_linked':{'enable':false},'move':{'enable':true,'speed':2,'random':true}}}); } }")
              f.write("function globalSearch(){ let q=document.getElementById('search-bar').value.toLowerCase(); document.querySelectorAll('.cat-content').forEach(c=>{ let items=c.querySelectorAll('li'); let cnt=0; items.forEach(li=>{ if(li.textContent.toLowerCase().includes(q)){ li.style.display=''; cnt++; } else li.style.display='none'; }); c.style.display=(q && cnt>0)?'block':'none'; }); }")
              f.write("function showCat(id){document.querySelectorAll('.cat-content').forEach(e=>e.style.display='none');document.querySelectorAll('.sidebar-link').forEach(e=>e.classList.remove('active'));document.getElementById(id).style.display='block';document.getElementById('l-'+id).classList.add('active');} ")
              f.write("window.onload=()=>{ switchTheme('ferry'); };</script></body></html>")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Final Fix: Restore Full Guide Text & Layout Polish" || exit 0
          git push origin main
