name: Generate Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate nested index.html
        run: |
          python <<'EOF'
          import os

          # [파일 주입 및 트리 생성 로직 - 유지]
          def inject_width_style(filepath):
              style_code = """<style>body, .fr-view, #content, .main-container, .article-content, div[class*="content"] { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 10px !important; } img { max-width: 100% !important; height: auto !important; }</style>"""
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  for nick in ["Ryl3", "ryl3", "RYL3"]: content = content.replace(nick, "")
                  if '<head>' in content: content = content.replace('<head>', '<head>' + style_code)
                  with open(filepath, 'w', encoding='utf-8') as f: f.write(content)
              except: pass

          skyrim_pack_names = ["뷰리다", "애니림", "짬뽕림", "뉴상림", "mz팩", "로어림", "Ferry"]
          fallout_pack_names = ["짬통팩", "스위트폴"]

          tree = {}
          for root, dirs, files in sorted(os.walk('.')):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
              rel_path = os.path.relpath(root, '.')
              if rel_path == "." or rel_path.startswith('.'): continue
              parts = rel_path.split(os.sep)
              curr = tree
              for p in parts:
                  if p not in curr: curr[p] = {'_files': [], '_dirs': {}}
                  curr = curr[p]['_dirs']
              curr_node = tree
              for p in parts[:-1]: curr_node = curr_node[p]['_dirs']
              curr_node[parts[-1]]['_files'] = sorted(html_files)

          def render_tree(node_name, node_data, depth, is_rr, full_path):
              icon = "railroad.jpg" if is_rr else "ElderScroll.webp"
              img_style = "width:28px; aspect-ratio:1/1; object-fit:contain; margin-right:10px; vertical-align:middle;"
              if is_rr: img_style += " filter:invert(1) brightness(1.5);"
              margin = f"margin-left:{depth * 15}px;"
              html = f"<div style='{margin} margin-bottom:8px; width:100%; box-sizing:border-box;'>"
              html += f"<details open style='background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.05); border-radius:8px; overflow:hidden;'>"
              html += f"<summary style='padding:12px 15px; font-weight:bold; color:#fff; cursor:pointer; list-style:none; display:flex; align-items:center; background:rgba(255,255,255,0.03);'>"
              html += f"<img src='{icon}' style='{img_style}'>{node_name}</summary>"
              html += "<ul style='margin:0; padding:10px 20px 15px 40px; list-style-type:none;'>"
              for f in node_data['_files']:
                  f_path = os.path.join(full_path, f)
                  inject_width_style(f_path)
                  url = f_path.replace(os.sep, '/')
                  disp = f.replace('.html', '').split(' (')[0].replace(' - 툴리우스 채널', '')
                  f_icon = "▪️ " if is_rr else f"<img src='ElderScroll.webp' style='width:16px; margin-right:8px;'>"
                  html += f'<li style="margin:8px 0;"><a href="{url}" target="_blank" class="file-link">{f_icon}{disp}</a></li>'
              html += "</ul>"
              for child_name, child_data in node_data['_dirs'].items():
                  html += render_tree(child_name, child_data, depth+1, is_rr, os.path.join(full_path, child_name))
              html += "</details></div>"
              return html

          main_contents = {"ferry": "", "railroad": ""}
          sidebar_data = {"ferry": {"modpack": "", "normal": ""}, "railroad": {"modpack": "", "normal": ""}}
          for top_folder, data in tree.items():
              is_rr = any(k in top_folder.upper() for k in ["FALLOUT", "폴아웃"]) or any(k in top_folder for k in fallout_pack_names)
              theme_key = "railroad" if is_rr else "ferry"
              fid = "f-" + top_folder.replace(os.sep, '-')
              main_contents[theme_key] += f"<div id='{fid}' class='cat-content' style='display:none; width:100%;'>" + render_tree(top_folder, data, 0, is_rr, top_folder) + "</div>"
              is_modpack = any(k in top_folder for k in skyrim_pack_names + fallout_pack_names) or "[모드팩]" in top_folder
              category = "modpack" if is_modpack else "normal"
              sidebar_data[theme_key][category] += f"<a href='javascript:void(0)' onclick='showCat(\"{fid}\")' class='sidebar-link' id='l-{fid}'>- {top_folder}</a>"

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius Archive</title><style>")
              f.write("html { overflow-y: scroll; scroll-behavior: smooth; }")
              f.write("body { margin:0; min-height:100vh; background-color:#000; font-family:sans-serif; color:#eee; overflow-x:hidden; transition:0.4s; }")
              f.write("a, button, summary { cursor:pointer !important; text-decoration:none !important; }")
              f.write("summary::-webkit-details-marker { display:none; }")
              
              f.write(".top-header { position:fixed; top:0; left:0; width:100%; height:70px; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:1000; border-bottom:2px solid rgba(255,255,255,0.1); }")
              f.write(".header-container { width:100%; max-width:1400px; display:flex; justify-content:space-between; align-items:center; padding:0 40px; box-sizing:border-box; }")
              f.write(".header-group { display:flex; align-items:center; gap:15px; }")
              
              # 버튼 CSS 강화: 기본 스타일 완전 제거 및 고정
              f.write(".header-btn { -webkit-appearance:none; border:1px solid; border-radius:6px; padding:0 18px; height:40px; font-weight:bold; font-size:0.9em; display:inline-flex; align-items:center; gap:8px; color:inherit; background:transparent; transition:0.3s; box-sizing:border-box; }")
              f.write("#btn-f:hover { background:rgba(255,255,255,0.15); box-shadow:0 0 15px #fff; }")
              f.write("#btn-v:hover { background:rgba(255,176,0,0.15); box-shadow:0 0 15px #FFB000; }")
              
              f.write(".sidebar-nav { width:330px; position:fixed; top:110px; left:40px; height:calc(100vh - 150px); background:rgba(0,0,0,0.85); border:1px solid #444; border-radius:8px; padding:25px; overflow-y:auto; z-index:100; opacity:0; visibility:hidden; transition:0.3s; box-sizing:border-box; }")
              f.write(".sidebar-nav.active { opacity:1; visibility:visible; }")
              f.write(".main-area { margin-left:420px; padding:110px 60px 50px 0; position:relative; z-index:10; width:calc(100% - 480px); max-width:1200px; box-sizing:border-box; }")
              f.write("#search-bar { width:100% !important; box-sizing:border-box; padding:15px 25px; border-radius:30px; border:1px solid #444; background:rgba(255,255,255,0.05); color:#fff; margin:20px 0; display:block; }")
              
              # 테마 배경
              f.write(".theme-ferry { background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 5%, rgba(0,0,0,0) 20%), url('skyrim.png') center 10%/cover no-repeat fixed; }")
              f.write(".theme-vault { background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 5%, rgba(0,0,0,0) 20%), url('fallout.png') center top 70px/cover no-repeat fixed; }")
              
              # 모달 스타일
              f.write(".modal { display:none; position:fixed; z-index:3000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); }")
              f.write(".modal-content { background:#111; margin:5% auto; padding:50px; border:1px solid #333; border-radius:15px; width:90%; max-width:1000px; position:relative; max-height:85vh; overflow-y:auto; box-sizing:border-box; word-break:keep-all; }")
              f.write("</style></head><body>")

              # 1. 가이드 모달 내용 복구
              f.write("<div id='guideModal' class='modal'><div class='modal-content' id='modal-c'><span style='position:absolute; top:20px; right:25px; font-size:28px; cursor:pointer; color:#666;' onclick='closeModal()'>&times;</span><h3 id='modal-t' style='margin-top:0; font-size:1.8em;'>📜 가이드 및 후기</h3><div style='color:#ddd; line-height:2; font-size:1.05em;'><p><strong>💡 이용 팁:</strong><br>")
              f.write("<span style='margin-bottom:12px; display:block;'>- 대부분의 파일은 HTML 양식으로 백업되어 있습니다. <strong>(기술적 한계로 영상은 출력되지 않습니다.)</strong></span>")
              f.write("<span style='margin-bottom:12px; display:block;'>- <strong>질문, 피드백, 로그</strong>의 경우 일일히 버전이나 문제 유형을 구분하기 어려워 <strong>폴더 하나에 구분없이 넣었습니다.</strong> 양해 바랍니다.</span>")
              f.write("<span style='margin-bottom:12px; display:block;'>- <strong>미해결 탭</strong>의 경우 해결되지 않았다고 생각되는 이슈들을 백업해 놓았습니다. <strong>해결된 문제가 있으면 피드백 부탁드립니다.</strong></span>")
              f.write("<span style='margin-bottom:12px; display:block;'>- 자잘한 픽스나 번역은 원본 대신 HTML 링크로 백업되었으며, <strong>외부 링크(구드/메가)가 터지는 경우는 대처가 어렵습니다.</strong></span>")
              f.write("<span style='margin-bottom:12px; display:block;'>- <strong>모드팩, 프리셋, 의상, 동료</strong> 등 주요 자료는 테라박스에 원본으로 백업되어 있습니다. <span style='color:#FFB000; font-weight:bold;'>(파일 암호 필수 확인)</span></span></p>")
              f.write("<p><span style='color:#58a6ff; font-weight: bold;'>* 백업 관련 피드백은 좌측 상단의 제보 버튼(깃허브 로그인 필요)이나 아카라이브(코네) 피드백 글에 댓글 부탁드립니다.</span></p>")
              f.write("<p style='border-top:1px solid #333; padding-top:20px; margin-top:20px;'><strong>✍️ 후기:</strong><br>공장장 이 개같은 년, 너 아니었음 이거 시작도 안 했어 알아? 알면 소븐가드에서 우릴 위해 술잔이나 들어달라고. <br>툴붕이들은 아프지 말고. 너네 없어지면 15년 동안 후속작 유기하는 토드 새끼 누가 욕해주냐?</p></div></div></div>")

              # 배경 캔버스 및 웰컴 화면
              f.write("<canvas id='smokeCanvas' style='position:fixed; top:0; left:0; width:100%; height:100%; z-index:5; pointer-events:none;'></canvas>")
              f.write("<div id='welcome-screen' style='position:fixed; top:70px; left:0; width:100vw; height:100vh; background:#000; z-index:2000; overflow:hidden;'><img src='welcome page.png' style='width:100%; height:100%; object-fit:cover; filter:brightness(0.5);'><div style='position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; width:100%;'><h1 style='color:#fff; font-size:3.5em;'>환영합니다</h1><p style='color:#ccc; font-size:1.6em;'>상단의 버튼을 눌러주세요</p></div></div>")
              
              # 헤더
              f.write("<header class='top-header'><div class='header-container'><div class='header-group'>")
              f.write("<button class='header-btn' id='btn-f' onclick='triggerTheme(\"ferry\")' style='border-color:#fff; color:#fff;'>Ferry (Skyrim)</button>")
              f.write("<button class='header-btn' id='btn-v' onclick='triggerTheme(\"vault\")' style='border-color:#FFB000; color:#FFB000;'>Railroad (Fallout)</button></div>")
              f.write("<div class='header-group'><button class='header-btn' style='border-color:#ccc; color:#ccc;' onclick='openModal()'>📖 가이드 & 후기</button>")
              f.write("<a href='https://github.com/vapingexperienc3-max/Tullius-s-ferry/issues' target='_blank' class='header-btn' style='border-color:#58a6ff; color:#58a6ff;'>📢 피드백 제보</a></div></div></header>")

              # 사이드바 및 메인
              sf_final = f"<details open style='margin-bottom:15px;'><summary style='color:#fff; font-weight:bold; padding:5px 0; border-bottom:1px solid #ffffff44; display:flex; align-items:center;'>모드팩 아카이브</summary><div style='padding-left:10px;'>{sidebar_data['ferry']['modpack']}</div></details>{sidebar_data['ferry']['normal']}"
              srr_final = f"<details open style='margin-bottom:15px;'><summary style='color:#FFB000; font-weight:bold; padding:5px 0; border-bottom:1px solid #FFB00044; display:flex; align-items:center;'>모드팩 아카이브</summary><div style='padding-left:10px;'>{sidebar_data['railroad']['modpack']}</div></details>{sidebar_data['railroad']['normal']}"
              f.write("<div id='main-wrapper' style='display:none;'><div class='sidebar-nav' id='main-lnb'><h3 id='idx-t' style='border-bottom:2px solid; padding-bottom:10px;'>INDEX</h3><div id='l-ferry'>" + sf_final + "</div><div id='l-vault' style='display:none;'>" + srr_final + "</div></div>")
              f.write("<div class='main-area'><h1 id='t-f' class='main-title' style='display:none; color:#fff; font-size:4.5em;'>Tullius's Ferry</h1><h1 id='t-v' class='main-title' style='display:none; color:#FFB000; font-size:4.5em;'>The Sole Survivor's Railroad</h1><input type='text' id='search-bar' placeholder='파일 검색...' onkeyup='globalSearch()'><div id='a-ferry'>" + main_contents['ferry'] + "</div><div id='a-vault' style='display:none;'>" + main_contents['railroad'] + "</div></div></div>")

              # 스크립트
              f.write("<script>")
              f.write("const canvas = document.getElementById('smokeCanvas'); const ctx = canvas.getContext('2d'); let particles = []; let themeColor = '#ffffff';")
              f.write("function openModal(){ document.getElementById('guideModal').style.display='block'; }")
              f.write("function closeModal(){ document.getElementById('guideModal').style.display='none'; }")
              f.write("function triggerTheme(m){ document.getElementById('welcome-screen').style.display='none'; document.getElementById('main-wrapper').style.display='flex'; switchTheme(m); themeColor = (m==='ferry' ? '#ffffff' : '#FFB000'); if(particles.length===0) { initSmoke(); animate(); } document.getElementById('main-lnb').classList.add('active'); }")
              f.write("function switchTheme(m){ const b=document.body; const lnb=document.getElementById('main-lnb'); const idx=document.getElementById('idx-t'); if(m==='ferry'){ b.className='theme-ferry'; document.getElementById('l-ferry').style.display='block'; document.getElementById('l-vault').style.display='none'; document.getElementById('t-f').style.display='block'; document.getElementById('t-v').style.display='none'; document.getElementById('a-ferry').style.display='block'; document.getElementById('a-vault').style.display='none'; lnb.style.borderColor='#fff'; idx.style.color='#fff'; idx.style.borderColor='#fff'; } else { b.className='theme-vault'; document.getElementById('l-ferry').style.display='none'; document.getElementById('l-vault').style.display='block'; document.getElementById('t-f').style.display='none'; document.getElementById('t-v').style.display='block'; document.getElementById('a-ferry').style.display='none'; document.getElementById('a-vault').style.display='block'; lnb.style.borderColor='#FFB000'; idx.style.color='#FFB000'; idx.style.borderColor='#FFB000'; } }")
              f.write("class Particle { constructor(){ this.reset(); } reset(){ this.x = Math.random() * canvas.width; this.y = canvas.height + 150; this.size = Math.random() * 120 + 80; this.speedY = Math.random() * 0.7 + 0.4; this.speedX = Math.random() * 0.6 - 0.3; this.opacity = Math.random() * 0.15 + 0.05; this.rotation = Math.random() * Math.PI * 2; this.rotSpeed = Math.random() * 0.015 - 0.007; this.growth = Math.random() * 0.3 + 0.2; } update(){ this.y -= this.speedY; this.x += this.speedX + Math.sin(this.y * 0.005) * 0.5; this.size += this.growth; this.rotation += this.rotSpeed; this.opacity -= 0.0003; if(this.opacity <= 0 || this.y < -400) this.reset(); } draw(){ ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.globalCompositeOperation = 'screen'; let grad = ctx.createRadialGradient(0,0,0,0,0,this.size); grad.addColorStop(0, themeColor + Math.floor(this.opacity*255).toString(16).padStart(2,'0')); grad.addColorStop(0.5, themeColor + Math.floor(this.opacity*40).toString(16).padStart(2,'0')); grad.addColorStop(1, 'transparent'); ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2); ctx.fill(); ctx.restore(); } }")
              f.write("function initSmoke(){ particles = []; for(let i=0; i<45; i++) particles.push(new Particle()); }")
              f.write("function animate(){ ctx.clearRect(0,0,canvas.width, canvas.height); particles.forEach(p=>{ p.update(); p.draw(); }); requestAnimationFrame(animate); }")
              f.write("function showCat(fid){ document.querySelectorAll('.cat-content').forEach(c=>c.style.display='none'); document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active')); if(document.getElementById(fid)) document.getElementById(fid).style.display='block'; if(document.getElementById('l-'+fid)) document.getElementById('l-'+fid).classList.add('active'); window.scrollTo({top:0,behavior:'smooth'}); }")
              f.write("function globalSearch(){ let q=document.getElementById('search-bar').value.toLowerCase(); document.querySelectorAll('.cat-content').forEach(cat=>{ let files=cat.querySelectorAll('.file-link'); let has=false; files.forEach(f=>{ let t=f.innerText.toLowerCase(); if(q===''||t.includes(q)){ f.parentElement.style.display='block'; has=true; } else f.parentElement.style.display='none'; }); cat.style.display=(q===''?'none':(has?'block':'none')); }); }")
              f.write("window.onresize = ()=>{ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }; canvas.width = window.innerWidth; canvas.height = window.innerHeight;")
              f.write("</script></body></html>")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "RESTORE: Guide modal content and final UI cleanup" || exit 0
          git push origin main
