- name: Generate nested index.html
        run: |
          python <<EOF
          import os

          # [생략: inject_width_style 및 기존 백업 로직 동일]

          def generate_html_list(startpath):
              html_content = ""
              sidebar_content = "<div class='sidebar-nav'>"
              sidebar_content += "<h3 style='color: #ffce54; font-size: 0.9em; margin-bottom: 15px; border-bottom: 1px solid rgba(255,206,84,0.3); padding-bottom: 5px;'>📜 NAVIGATION</h3>"
              
              folder_data = []
              for root, dirs, files in sorted(os.walk(startpath)):
                  dirs[:] = [d for d in dirs if not d.startswith('.')]
                  html_files = [f for f in files if f.endswith('.html') and f != 'index.html']
                  if html_files:
                      rel_path = os.path.relpath(root, startpath)
                      # [지능형 분류] 폴더명에 'vault'나 'fallout'이 들어있으면 404 탭으로
                      category = "fallout" if any(x in rel_path.lower() for x in ["vault", "fallout", "폴아웃"]) else "skyrim"
                      display_name = "MAIN ARCHIVE" if rel_path == "." else rel_path.upper()
                      folder_id = "folder-" + rel_path.replace(os.sep, '-')
                      folder_data.append((display_name, folder_id, root, html_files, category))

              for name, fid, _, _, cat in folder_data:
                  sidebar_content += f"<a href='#{fid}' class='sidebar-link cat-{cat}'>- {name}</a>"
              sidebar_content += "</div>"

              for name, fid, root, html_files, cat in folder_data:
                  icon_url = "https://img.icons8.com/ios-filled/50/ffffff/skyrim.png"
                  html_content += f"<details id='{fid}' data-category='{cat}' style='margin-bottom: 15px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 4px; overflow: hidden;'>"
                  html_content += f"<summary style='padding: 15px; font-weight: bold; cursor: pointer; list-style: none; color: #fff; letter-spacing: 1.5px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255, 255, 255, 0.05);'>"
                  html_content += f"<span><img src='{icon_url}' style='width:18px; margin-right:10px; opacity:0.9; vertical-align:text-bottom;'>{name}</span>"
                  html_content += f"<span style='font-size: 0.8em; color: #888; font-family: monospace;'>[{len(html_files)} FILES]</span></summary>"
                  html_content += "<ul style='margin: 0; padding: 15px 40px; list-style-type: square;'>"
                  for f in sorted(html_files):
                      # [생략: 백업본의 제목 정리 로직 그대로 유지]
                      html_content += f'<li style="margin: 10px 0;"><a href="{rel_file_path}" target="_blank" style="color: #ffce54; text-decoration: none;">{display_f}</a></li>'
                  html_content += "</ul></details>"
              return sidebar_content, html_content

          with open('index.html', 'w', encoding='utf-8') as f:
              # [백업본의 CSS 100% 복구]
              # body 배경, particlesJS 설정, 이스란 문구, 가이드 박스 텍스트 모두 백업본에서 가져옴
              # 여기에 .hidden { display: none !important; } 만 추가
              f.write("... (사용자님 백업본 내용) ...")
              
              # [탭 클릭 이벤트 추가]
              f.write("<div class='nav-btn' onclick='switchTab(\"skyrim\", this)'>🚣 Ferry</div>")
              f.write("<div class='nav-btn' onclick='switchTab(\"fallout\", this)'>☢️ Vault 404</div>")
              
              f.write(\"\"\"
              <script>
              function switchTab(cat, btn) {
                  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                  btn.classList.add('active');
                  document.querySelectorAll('details[data-category]').forEach(el => {
                      el.style.display = (el.getAttribute('data-category') === cat) ? '' : 'none';
                  });
                  document.querySelectorAll('.sidebar-link').forEach(link => {
                      link.style.display = (link.classList.contains('cat-' + cat)) ? '' : 'none';
                  });
              }
              window.onload = () => { switchTab('skyrim', document.querySelector('.nav-btn.active')); };
              </script>
              \"\"\")
          EOF
