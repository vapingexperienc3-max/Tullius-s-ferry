name: Generate Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 저장소 쓰기 권한 부여
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }} # 토큰 명시

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate nested index.html
        run: |
          python <<EOF
          import os

          def inject_width_style(filepath):
              style_code = """
              <style>
                body, .fr-view, #content, .main-container, .article-content, div[class*="content"] { 
                  max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 10px !important; 
                }
                img { max-width: 100% !important; height: auto !important; }
                .navbar-wrapper .user-info, .navbar-wrapper .nav-item.member { display: none !important; }
              </style>
              """
              try:
                  if not filepath.endswith('.html'): return
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  for nick in ["Ryl3", "ryl3", "RYL3"]:
                      content = content.replace(nick, "")
                  if 'max-width: 100% !important' not in content:
                      if '<head>' in content:
                          content = content.replace('<head>', '<head>' + style_code)
                      else:
                          content = style_code + content
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(content)
              except:
                  pass

          def generate_html_list(startpath):
              html_content = ""
              for root, dirs, files in sorted(os.walk(startpath)):
                  dirs[:] = [d for d in dirs if not d.startswith('.')]
                  html_files = [f for f in files if (f.endswith('.html') or '.' not in f) and f != 'index.html']
                  
                  if html_files:
                      rel_path = os.path.relpath(root, startpath)
                      icon_url = "https://img.icons8.com/ios-filled/50/ffffff/skyrim.png"
                      icon_html = f"<img src='{icon_url}' style='width:18px; margin-right:10px; opacity:0.9; vertical-align:text-bottom;'>"
                      display_name = "MAIN ARCHIVE" if rel_path == "." else rel_path.upper()
                      
                      html_content += f"<details style='margin-bottom: 15px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 4px; overflow: hidden;'>"
                      html_content += f"<summary style='padding: 15px; font-weight: bold; cursor: pointer; list-style: none; color: #fff; letter-spacing: 1.5px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255, 255, 255, 0.05);'>"
                      html_content += f"<span>{icon_html}{display_name}</span>"
                      html_content += f"<span style='font-size: 0.8em; color: #888; font-family: monospace;'>[{len(html_files)} FILES]</span>"
                      html_content += "</summary>"
                      html_content += "<ul style='margin: 0; padding: 15px 40px; list-style-type: square;'>"
                      
                      for f in sorted(html_files):
                          full_path = os.path.join(root, f)
                          inject_width_style(full_path)
                          rel_file_path = os.path.relpath(full_path, startpath).replace(os.sep, '/')
                          
                          display_f = f.replace('.html', '')
                          if ' (' in display_f: display_f = display_f.rsplit(' (', 1)[0]
                          if ' - 툴리우스 채널' in display_f: display_f = display_f.replace(' - 툴리우스 채널', '')
                          
                          html_content += f'<li style="margin: 10px 0;"><a href="{rel_file_path}" target="_blank" style="color: #ffce54; text-decoration: none; font-weight: 500; font-size: 0.95em;">{display_f}</a></li>'
                      html_content += "</ul></details>"
              return html_content

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write("<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'>")
              f.write("<meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Tullius's Ferry&Vault 404</title><style>")
              f.write("* { cursor: url('https://img.icons8.com/ios-filled/25/ffffff/sent.png'), auto !important; }")
              f.write("body { background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,1) 95%), linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://static.kinguin.net/media/catalog/category/cache/1/hi_image/9df78eab33525d08d6e5fb8d27136e95/The-Elder-Scrolls-V-Skyrim.jpg'); background-size: 100% auto; background-repeat: no-repeat; background-position: top center; background-attachment: scroll; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; line-height: 1.6; padding: 30px; max-width: 1000px; margin: auto; color: #eee; }")
              f.write("h1 { border-bottom: 2px solid #586069; padding-bottom: .3em; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }")
              f.write(".nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; }")
              f.write(".nav-btn { padding: 8px 18px; border: 1px solid rgba(255,206,84,0.4); border-radius: 4px; color: #ffce54; text-decoration: none; font-size: 0.85em; font-weight: bold; background: rgba(0,0,0,0.5); transition: 0.3s; letter-spacing: 1px; }")
              f.write(".nav-btn:hover { background: #ffce54; color: #000; box-shadow: 0 0 12px rgba(255,206,84,0.5); }")
              f.write(".nav-btn.active { background: rgba(255,206,84,0.15); border-color: #ffce54; cursor: default !important; }")
              f.write("#search-bar { width: 100%; padding: 12px 20px; margin: 20px 0; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; color: #fff; font-size: 1em; backdrop-filter: blur(5px); outline: none; transition: 0.3s; }")
              f.write("#search-bar:focus { background: rgba(255, 255, 255, 0.2); border-color: #ffce54; box-shadow: 0 0 10px rgba(255, 206, 84, 0.3); }")
              f.write("summary::-webkit-details-marker { display: none; } a:hover { color: #fff !important; text-decoration: underline; text-shadow: 0 0 8px #ffce54; }</style></head><body>")
              f.write("<div id='particles-js' style='position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;'></div>")
              f.write("<div style='border-bottom: 2px solid rgba(88, 96, 105, 0.5); margin-bottom: 20px; padding-bottom: 10px; display: flex; align-items: baseline; flex-wrap: wrap; gap: 12px;'>")
              f.write("<span style='font-size: 2.2em; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); letter-spacing: -1px;'>TULLIUS'S FERRY</span>")
              f.write("<span style='font-size: 1.7em; font-weight: 200; color: #ffce54; letter-spacing: 0.5px; opacity: 0.9;'>& <strong style='font-weight: 600;'>Vault 404</strong> - Vault boy's Outpost ☢️</span>")
              f.write("</div>")
              f.write("<div class='nav-tabs'><a href='#' class='nav-btn active'>🚣 Ferry (Skyrim)</a><a href='#' class='nav-btn' onclick='alert(\"준비 중\"); return false;'>☢️ Vault 404</a></div>")
              f.write("<p style='color: #bdc3c7;'>'언젠가 이런 날이 올 줄 알았지. 난 알았어. 하지만 아무도 믿지 않았지.'</p>")
              f.write("<input type='text' id='search-bar' placeholder='보관소 내 파일 검색...' onkeyup='filterList()'>")
              f.write("<div style='background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 206, 84, 0.3); border-radius: 8px; padding: 20px; margin-bottom: 30px; backdrop-filter: blur(10px); text-align: left;'>")
              f.write("<h3 style='color: #ffce54; margin-top: 0; margin-bottom: 15px; font-size: 1.1em;'>[🚣 가이드 및 후기]</h3>")
              f.write("<div style='font-size: 0.9em; color: #ccc; line-height: 1.8;'>")
              f.write("<p style='margin-bottom: 15px;'><strong>💡 이용 팁:</strong><br>- HTML 양식으로 백업되어 영상은 출력되지 않습니다.<br>- 질문/피드백은 폴더 하나에 모여있습니다.<br>- 테라박스 링크 깨지면 피드백 부탁드립니다.</p>")
              f.write("<p style='border-top: 1px solid rgba(255,206,84,0.15); padding-top: 15px;'><strong>✍️ 후기:</strong><br>공장장 이 개같은 년... 너네 없어지면 15년 동안 후속작 유기하는 토드 새끼 누가 욕해주냐?</p></div></div>")
              f.write(generate_html_list('.'))
              f.write("<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script>")
              f.write("<script>particlesJS('particles-js', {'particles':{'number':{'value':150},'color':{'value':'#ffffff'},'opacity':{'value':0.5},'size':{'value':3},'move':{'enable':true,'speed':1.5,'direction':'bottom','out_mode':'out'}}});")
              f.write("function filterList(){let q=document.getElementById('search-bar').value.toLowerCase();document.querySelectorAll('details').forEach(d=>{let v=false;d.querySelectorAll('li').forEach(i=>{let t=i.textContent.toLowerCase();if(t.includes(q)){i.style.display='';v=true;}else{i.style.display='none';}});if(v){d.style.display='';if(q.length>0)d.open=true;}else{d.style.display='none';}})}</script></body></html>")
          EOF

      - name: Commit and Push
        run: |
          # Git이 현재 폴더를 안전하다고 인식하게 함
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경사항 확인 및 푸시
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "style: Restore original design and clean titles" && git push origin main)
