<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><title>Tullius Archive</title><style>body { margin: 0; min-height: 100vh; background-color: #000; background-attachment: fixed; background-repeat: no-repeat; transition: background 0.5s, background-position 0s; font-family: sans-serif; color: #eee; overflow-x: hidden; }</style></head><body><div id='particles-js' style='position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;'></div><script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script><script>function updateParticles(m){  if(window.pJSDom && window.pJSDom.length) { window.pJSDom[0].pJS.fn.vendors.destroypJS(); window.pJSDom = []; }  let conf;  if(m==='ferry'){    conf = {particles:{number:{value:80},color:{value:'#fff'},shape:{type:'circle'},opacity:{value:0.6},size:{value:3},line_linked:{enable:false},move:{enable:true,speed:1.2,direction:'bottom',random:true,out_mode:'out'}}};  } else {    conf = {particles:{number:{value:120},color:{value:['#39FF14', '#4b3c2a']},shape:{type:'circle'},opacity:{value:0.7},size:{value:2.5},line_linked:{enable:false},move:{enable:true,speed:1,direction:'top',random:true,out_mode:'out'}}};  }  particlesJS('particles-js', conf);}function triggerTheme(m){  document.getElementById('welcome-msg').style.display='none';  document.getElementById('main-content-ui').style.display='block';  const lnb = document.getElementById('main-lnb');  lnb.classList.remove('active');  switchTheme(m);  updateParticles(m);  setTimeout(() => { lnb.classList.add('active'); }, 100);}</script></body></html>
